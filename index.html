<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="theme-color" content="#07090A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2307090A'/><text y='68' x='50' text-anchor='middle' font-size='60'>🎾</text></svg>">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800;900&display=swap');
    :root{--lime:#C8FF00;--bg:#07090A;--card:#111214;--card2:#161819;--border:#1e2022;--text:#fff;--text2:#a0a4a8;--text3:#5a5e62;--font:'Outfit',sans-serif;--mono:'DM Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

    input{font-family:var(--font);-webkit-appearance:none}input:focus{outline:none}
    ::selection{background:rgba(200,255,0,.3)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes glow{0%,100%{box-shadow:0 0 16px rgba(200,255,0,.15)}50%{box-shadow:0 0 32px rgba(200,255,0,.35)}}
    @keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;
const PTS=["0","15","30","40"],L="#C8FF00",BG="#07090A";
const Icon=({d,size=20,color="#fff",style={}})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}><path d={d}/></svg>);
const I={undo:"M3 10h10a5 5 0 0 1 0 10H3 M3 10l4-4 M3 10l4 4",end:"M18 6L6 18 M6 6l12 12",swap:"M7 16V4m0 0L3 8m4-4l4 4 M17 8v12m0 0l4-4m-4 4l-4-4",check:"M20 6L9 17l-5-5",sound_on:"M11 5L6 9H2v6h4l5 4V5z M15.54 8.46a5 5 0 0 1 0 7.07 M19.07 4.93a10 10 0 0 1 0 14.14",sound_off:"M11 5L6 9H2v6h4l5 4V5z M23 9l-6 6 M17 9l6 6",edit:"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",share:"M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8 M16 6l-4-4-4 4 M12 2v13",skip_prev:"M6 6h2v12H6z M20 6l-10 6 10 6z",skip_next:"M16 6h2v12h-2z M4 6l10 6-10 6z",pause:"M6 4h4v16H6z M14 4h4v16h-4z",wifi:"M5 12.55a11 11 0 0 1 14.08 0 M8.53 16.11a6 6 0 0 1 6.95 0 M12 20h.01"};

/* MEDIA SESSION */
const WR={ctx:null,audio:null,active:false,onPrev:null,onNext:null,onPause:null,
activate(n1,n2){if(this.active)return true;try{const AC=window.AudioContext||window.webkitAudioContext;this.ctx=new AC();const o=this.ctx.createOscillator();o.frequency.value=1;const g=this.ctx.createGain();g.gain.value=.001;const d=this.ctx.createMediaStreamDestination();o.connect(g);g.connect(d);g.connect(this.ctx.destination);o.start();this.audio=new Audio();this.audio.srcObject=d.stream;this.audio.loop=true;this.audio.play();this._o=o}catch{return false}if('mediaSession'in navigator){navigator.mediaSession.metadata=new MediaMetadata({title:'🎾 Match',artist:`${n1} vs ${n2}`,album:'Tennis Score'});navigator.mediaSession.setActionHandler('previoustrack',()=>this.onPrev?.());navigator.mediaSession.setActionHandler('nexttrack',()=>this.onNext?.());navigator.mediaSession.setActionHandler('pause',()=>{this.onPause?.();setTimeout(()=>{this.audio?.play().catch(()=>{});navigator.mediaSession.playbackState='playing'},150)});navigator.mediaSession.setActionHandler('play',()=>{this.audio?.play().catch(()=>{});navigator.mediaSession.playbackState='playing'});navigator.mediaSession.playbackState='playing'}this.active=true;return true},
update(t,n1,n2){if('mediaSession'in navigator)navigator.mediaSession.metadata=new MediaMetadata({title:'🎾 '+t,artist:`${n1} vs ${n2}`,album:'Tennis Score'})},
stop(){try{this._o?.stop();this.ctx?.close()}catch{}this.audio?.pause();this.audio=null;this.ctx=null;if('mediaSession'in navigator)['previoustrack','nexttrack','pause','play'].forEach(a=>navigator.mediaSession.setActionHandler(a,null));this.active=false}};

/* LIVE SYNC — improved P2P with STUN servers, auto-reconnect, retry */
const LS={peer:null,conns:[],roomId:null,lastState:null,_destroyed:false,
genId(){return'ts'+Math.random().toString(36).slice(2,8)},
_cfg(){return{debug:0,config:{iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"},{urls:"stun:stun2.l.google.com:19302"},{urls:"stun:stun3.l.google.com:19302"},{urls:"stun:stun4.l.google.com:19302"}]}}},
host(cb){if(this.peer)return;this.roomId=this.genId();try{this.peer=new Peer(this.roomId,this._cfg());this.peer.on('open',()=>cb?.(this.roomId));this.peer.on('connection',c=>{c.on('open',()=>{this.conns.push(c);if(this.lastState)try{c.send(this.lastState)}catch{}});c.on('close',()=>{this.conns=this.conns.filter(x=>x!==c)});c.on('error',()=>{this.conns=this.conns.filter(x=>x!==c)})});this.peer.on('disconnected',()=>{setTimeout(()=>{try{this.peer?.reconnect()}catch{}},2000)});this.peer.on('error',e=>{if(e.type==='disconnected'||e.type==='network')setTimeout(()=>{try{this.peer?.reconnect()}catch{}},3000)})}catch{}},
send(d){this.lastState=d;const dead=[];this.conns.forEach(c=>{try{if(c.open)c.send(d);else dead.push(c)}catch{dead.push(c)}});if(dead.length)this.conns=this.conns.filter(c=>!dead.includes(c))},
join(id,onData,onOk,onErr){let retries=0;const maxRetries=20;const self=this;self._destroyed=false;function attempt(){if(self._destroyed)return;try{const pid='tv_'+self.genId()+Math.random().toString(36).slice(2,6);self.peer=new Peer(pid,self._cfg());self.peer.on('open',()=>{if(self._destroyed){self.peer.destroy();return}const c=self.peer.connect(id,{reliable:true,serialization:'json'});const timeout=setTimeout(()=>{retry()},15000);c.on('open',()=>{clearTimeout(timeout);retries=0;onOk?.()});c.on('data',d=>onData?.(d));c.on('close',()=>{clearTimeout(timeout);retry()});c.on('error',()=>{clearTimeout(timeout);retry()})});self.peer.on('error',e=>{if(e.type==='peer-unavailable'&&retries>=3)onErr?.(e.type);retry()});self.peer.on('disconnected',()=>retry())}catch{onErr?.('fail')}}function retry(){retries++;if(retries>maxRetries){onErr?.('max-retries');return}const delay=Math.min(1500+1000*retries,10000);setTimeout(()=>{try{self.peer?.destroy()}catch{}if(!self._destroyed)attempt()},delay)}attempt()},
destroy(){this._destroyed=true;try{this.peer?.destroy()}catch{}this.peer=null;this.conns=[];this.roomId=null;this.lastState=null}};

/* TENNIS ENGINE */
const vib=p=>{try{navigator.vibrate?.(p)}catch{}};
const fmt=ms=>{const s=Math.floor(ms/1000);return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0")};
const clone=o=>JSON.parse(JSON.stringify(o));
function fresh(sv,cfg){return{p1:0,p2:0,g1:0,g2:0,s1:0,s2:0,sets:[],t1:0,t2:0,tb:false,tb1:0,tb2:0,mtb:false,mtb1:0,mtb2:0,deuce:false,adv:false,advP:null,over:false,winner:null,server:sv,pn:0,cfg}}
function wg(s,p){const SL=s.cfg.setLen;if(p===1)s.g1++;else s.g2++;s.p1=0;s.p2=0;s.deuce=false;s.adv=false;s.advP=null;s.tb1=0;s.tb2=0;s.tb=false;s.server=s.server===1?2:1;if(s.g1>=SL&&s.g1-s.g2>=2)return wst(s,1);if(s.g2>=SL&&s.g2-s.g1>=2)return wst(s,2);if(s.g1===SL&&s.g2===SL)s.tb=true;return s}
function wst(s,p){s.sets.push({a:s.g1,b:s.g2});if(p===1)s.s1++;else s.s2++;s.g1=0;s.g2=0;if(s.s1>=2){s.over=true;s.winner=1;return s}if(s.s2>=2){s.over=true;s.winner=2;return s}if(s.cfg.matchTB&&s.s1===1&&s.s2===1)s.mtb=true;return s}
function pt(prev,p){const s=clone(prev);if(s.over)return s;s.pn++;if(p===1)s.t1++;else s.t2++;if(s.mtb){if(p===1)s.mtb1++;else s.mtb2++;s.p1=s.mtb1;s.p2=s.mtb2;if((s.mtb1+s.mtb2)%2===1)s.server=s.server===1?2:1;if(s.mtb1>=10&&s.mtb1-s.mtb2>=2){s.sets.push({a:s.mtb1,b:s.mtb2,mtb:true});s.over=true;s.winner=1}if(s.mtb2>=10&&s.mtb2-s.mtb1>=2){s.sets.push({a:s.mtb1,b:s.mtb2,mtb:true});s.over=true;s.winner=2}return s}if(s.tb){if(p===1)s.tb1++;else s.tb2++;s.p1=s.tb1;s.p2=s.tb2;if((s.tb1+s.tb2)%2===1)s.server=s.server===1?2:1;if(s.tb1>=7&&s.tb1-s.tb2>=2)return wg(s,1);if(s.tb2>=7&&s.tb2-s.tb1>=2)return wg(s,2);return s}if(s.cfg.noAd&&s.p1>=3&&s.p2>=3)return wg(s,p);if(s.p1>=3&&s.p2>=3){if(s.adv){if(s.advP===p)return wg(s,p);s.adv=false;s.advP=null;s.deuce=true;return s}if(s.deuce||(s.p1===3&&s.p2===3)){s.deuce=false;s.adv=true;s.advP=p;return s}}if(p===1)s.p1++;else s.p2++;if(s.p1>=4)return wg(s,1);if(s.p2>=4)return wg(s,2);if(s.p1===3&&s.p2===3)s.deuce=true;return s}
function gp(m,p){if(m.mtb)return p===1?String(m.mtb1):String(m.mtb2);if(m.tb)return p===1?String(m.tb1):String(m.tb2);if(m.deuce)return"40";if(m.adv)return m.advP===p?"AD":"40";const v=p===1?m.p1:m.p2;return PTS[v]||String(v)}
function scoreText(m,n1,n2){if(m.over)return(m.winner===1?n1:n2)+" wins!";if(m.mtb)return m.server===1?`${m.mtb1}\u2013${m.mtb2}`:`${m.mtb2}\u2013${m.mtb1}`;if(m.tb)return m.server===1?`${m.tb1}\u2013${m.tb2}`:`${m.tb2}\u2013${m.tb1}`;if(m.deuce)return"Deuce";if(m.adv)return`AD ${m.advP===1?n1:n2}`;const a=PTS[m.p1],b=PTS[m.p2];return m.server===1?`${a}\u2013${b}`:`${b}\u2013${a}`}
function watchScore(m,n1,n2){if(m.over)return(m.winner===1?n1:n2)+" wins!";if(m.mtb)return`${m.mtb1}\u2013${m.mtb2}`;if(m.tb)return`${m.tb1}\u2013${m.tb2}`;if(m.deuce)return"Deuce";if(m.adv)return`AD ${m.advP===1?n1:n2}`;return`${PTS[m.p1]||m.p1}\u2013${PTS[m.p2]||m.p2}`}
function chkSw(m){if(m.over)return false;if(m.mtb){const x=m.mtb1+m.mtb2;return x>0&&x%6===0}if(m.tb){const x=m.tb1+m.tb2;return x>0&&x%6===0}const g=m.g1+m.g2;return g>0&&g%2!==0&&m.p1===0&&m.p2===0}

/* UMPIRE */
const Ump={on:true,say(t,d=0){if(!this.on||!('speechSynthesis'in window))return;setTimeout(()=>{const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;u.pitch=.85;const v=speechSynthesis.getVoices();const p=v.find(x=>x.name.includes('Samantha')||x.name.includes('Daniel')||x.name.includes('Karen'))||v.find(x=>x.lang.startsWith('en')&&!x.name.includes('Google'))||v.find(x=>x.lang.startsWith('en'));if(p)u.voice=p;speechSynthesis.cancel();speechSynthesis.speak(u)},d)},ann(prev,next,n1,n2){if(!this.on)return;if(next.over&&!prev.over){this.say(`Game, set, match. ${next.winner===1?n1:n2}`);return}if(next.mtb){if(!prev.mtb){this.say("One set all. Match tiebreak");return}const t=`${next.mtb1}, ${next.mtb2}`;this.say(chkSw(next)?t+". Change ends":t);return}if(next.sets.length>prev.sets.length){const ls=next.sets.at(-1);this.say(`Game and set, ${ls.a>ls.b?n1:n2}. ${ls.a}, ${ls.b}`);return}const pg=prev.g1+prev.g2,ng=next.g1+next.g2;if(ng>pg||(pg>0&&ng===0&&next.sets.length===prev.sets.length)){if(next.tb&&!prev.tb){this.say(`${next.cfg.setLen} all. Tiebreak`);return}this.say(`Game. ${next.g1}, ${next.g2}`);if(chkSw(next))this.say("Change ends",2000);return}if(next.tb){const t=`${next.tb1}, ${next.tb2}`;this.say(chkSw(next)?t+". Change ends":t);return}if(next.deuce){this.say("Deuce");return}if(next.adv){this.say(`Advantage, ${next.advP===1?n1:n2}`);return}const a=PTS[next.p1],b=PTS[next.p2];if(a===b&&a!=="0")this.say(`${a} all`);else if(next.server===1)this.say(`${a}. ${b}`);else this.say(`${b}. ${a}`)}};

function fmtMsg(m,p1,p2,el){let l=[`${p1} vs ${p2}`];if(m.sets?.length>0)l.push(m.sets.map(s=>s.mtb?`TB:${s.a}\u2013${s.b}`:`${s.a}\u2013${s.b}`).join('  '));if(m.over)l.push(`${m.winner===1?p1:p2} wins!`);else{l.push(`Set ${m.sets.length+1}: ${m.g1}\u2013${m.g2}`);if(m.deuce)l.push('Deuce');else if(m.adv)l.push(`AD ${m.advP===1?p1:p2}`);else l.push(`Points: ${scoreText(m,p1,p2)}`);l.push(`${m.server===1?p1:p2} serving`)}l.push(`${fmt(el)}`);l.push('');l.push(`Tennis Score — APP_LINK`);return l.join('\n')}

/* UI ATOMS */
function Badge({children,color=L,bg="rgba(200,255,0,.08)",style={}}){return<span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:20,background:bg,color,fontSize:10,fontWeight:600,fontFamily:"var(--mono)",letterSpacing:1,...style}}>{children}</span>}
function Seg({options,value,onChange}){return<div style={{display:"flex",background:"var(--card)",borderRadius:10,padding:3,gap:2}}>{options.map(o=>{const s=o.v===value;return<button key={String(o.v)} onClick={()=>onChange(o.v)} style={{flex:1,padding:"8px 0",borderRadius:8,background:s?"rgba(200,255,0,.12)":"transparent",color:s?L:"var(--text3)",fontSize:13,fontWeight:s?700:500,border:s?"1px solid rgba(200,255,0,.2)":"1px solid transparent"}}>{o.l}</button>})}</div>}
function Sheet({onClose,ch}){return<div onClick={onClose} style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeOverlay .2s ease"}}><div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:400,background:"var(--card2)",borderRadius:"20px 20px 0 0",padding:"20px 24px 32px",maxHeight:"75vh",overflow:"auto",animation:"fadeIn .3s ease"}}><div style={{width:36,height:4,borderRadius:2,background:"var(--border)",margin:"0 auto 16px"}}/>{ch}</div></div>}
function NB({v,sel,onClick}){return<button onClick={onClick} style={{minWidth:36,height:34,borderRadius:8,background:sel?"rgba(200,255,0,.15)":"var(--card)",border:sel?`1.5px solid ${L}`:"1.5px solid var(--border)",color:sel?L:"var(--text2)",fontSize:13,fontWeight:700,fontFamily:"var(--mono)",padding:"0 4px"}}>{v}</button>}

/* HELP */
function HelpSheet({onClose}){return<Sheet onClose={onClose} ch={<><h3 style={{fontSize:16,fontWeight:800,marginBottom:16}}>Scoring Formats</h3><div style={{fontSize:13,color:"var(--text2)",lineHeight:1.9}}><div style={{marginBottom:16}}><div style={{color:L,fontWeight:700,marginBottom:4}}>Set Length</div><div><b style={{color:"var(--text)"}}>6</b> — Standard. TB at 6-6.</div><div><b style={{color:"var(--text)"}}>4</b> — Short set.</div><div><b style={{color:"var(--text)"}}>8</b> — Pro set.</div></div><div style={{marginBottom:16}}><div style={{color:L,fontWeight:700,marginBottom:4}}>Deuce</div><div><b style={{color:"var(--text)"}}>Advantage</b> — Win by 2.</div><div><b style={{color:"var(--text)"}}>No-Ad</b> — Deciding point at 40-40.</div></div><div><div style={{color:L,fontWeight:700,marginBottom:4}}>Final Set</div><div><b style={{color:"var(--text)"}}>Normal</b> — Regular 3rd set.</div><div><b style={{color:"var(--text)"}}>Match TB</b> — TB to 10.</div></div></div><button onClick={onClose} style={{width:"100%",marginTop:20,padding:14,borderRadius:12,background:"rgba(255,255,255,.06)",color:"var(--text2)",fontWeight:700}}>Got it</button></>}/>}

/* EDIT (redesigned: table layout) */
function EditSheet({m,p1,p2,onApply,onClose}){
  const[s1,ss1]=useState(m.s1);const[s2,ss2]=useState(m.s2);
  const[g1,sg1]=useState(m.g1);const[g2,sg2]=useState(m.g2);
  const[sv,ssv]=useState(m.server);
  const apply=()=>{const n=clone(m);n.s1=s1;n.s2=s2;n.g1=g1;n.g2=g2;n.server=sv;n.p1=0;n.p2=0;n.deuce=false;n.adv=false;n.advP=null;n.tb=false;n.tb1=0;n.tb2=0;n.mtb=false;n.mtb1=0;n.mtb2=0;if(g1===n.cfg.setLen&&g2===n.cfg.setLen)n.tb=true;if(n.cfg.matchTB&&s1===1&&s2===1&&g1===0&&g2===0)n.mtb=true;onApply(n);onClose()};
  return<Sheet onClose={onClose} ch={<>
    <h3 style={{fontSize:16,fontWeight:800,marginBottom:16}}>Edit Score</h3>
    <div style={{display:"grid",gridTemplateColumns:"72px 1fr 1fr",gap:8,marginBottom:6}}>
      <div/><div style={{textAlign:"center",fontSize:13,fontWeight:700,color:L}}>{p1}</div><div style={{textAlign:"center",fontSize:13,fontWeight:700,color:L}}>{p2}</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"72px 1fr 1fr",gap:8,marginBottom:10,alignItems:"center"}}>
      <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:1}}>SETS</div>
      <div style={{display:"flex",gap:4,justifyContent:"center"}}>{[0,1].map(n=><NB key={n} v={n} sel={s1===n} onClick={()=>ss1(n)}/>)}</div>
      <div style={{display:"flex",gap:4,justifyContent:"center"}}>{[0,1].map(n=><NB key={n} v={n} sel={s2===n} onClick={()=>ss2(n)}/>)}</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"72px 1fr 1fr",gap:8,marginBottom:14,alignItems:"center"}}>
      <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:1}}>GAMES</div>
      <div style={{display:"flex",gap:3,justifyContent:"center",flexWrap:"wrap"}}>{[0,1,2,3,4,5,6,7].map(n=><NB key={n} v={n} sel={g1===n} onClick={()=>sg1(n)}/>)}</div>
      <div style={{display:"flex",gap:3,justifyContent:"center",flexWrap:"wrap"}}>{[0,1,2,3,4,5,6,7].map(n=><NB key={n} v={n} sel={g2===n} onClick={()=>sg2(n)}/>)}</div>
    </div>
    <div style={{marginBottom:14}}><div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:1,marginBottom:6}}>SERVING</div><Seg options={[{v:1,l:p1},{v:2,l:p2}]} value={sv} onChange={ssv}/></div>
    <p style={{fontSize:11,color:"var(--text3)",marginBottom:14}}>Points reset to 0–0 from this score.</p>
    <div style={{display:"flex",gap:8}}><button onClick={onClose} style={{flex:1,padding:14,borderRadius:12,background:"var(--card)",color:"var(--text2)",fontWeight:700}}>Cancel</button><button onClick={apply} style={{flex:1,padding:14,borderRadius:12,background:L,color:BG,fontWeight:800}}>Apply</button></div>
  </>}/>;
}

/* SHARE (live link + text) */
function ShareSheet({m,p1,p2,el,roomId,onClose}){
  const[cp,setCp]=useState(false);
  const msg=fmtMsg(m,p1,p2,el);

ion:"absolute",top:-11,left:"50%",transform:"translateX(-50%)",width:32,height:11,borderRadius:"5px 5px 0 0",background:"var(--card2)",border:"1px solid var(--border)",borderBottom:"none"}}/><div style={{position:"absolute",bottom:-11,left:"50%",transform:"translateX(-50%)",width:32,height:11,borderRadius:"0 0 5px 5px",background:"var(--card2)",border:"1px solid var(--border)",borderTop:"none"}}/><div style={{position:"absolute",right:-7,top:"50%",transform:"translateY(-50%)",width:5,height:16,borderRadius:3,background:"#333"}}/><div style={{display:"flex",gap:6}}>{[{i:I.skip_prev,c:L},{i:I.pause,c:"#FF9F0A"},{i:I.skip_next,c:L}].map((b,i)=><div key={i} style={{width:22,height:22,borderRadius:5,background:"rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon d={b.i} size={11} color={b.c}/></div>)}</div></div>}

/* MAIN APP */
function App(){

  const[showHelp,setShowHelp]=useState(false);const[showEdit,setShowEdit]=useState(false);const[showShare,setShowShare]=useState(false);
  const[m,setM]=useState(null);const[hist,setHist]=useState([]);const[el,setEl]=useState(0);const[fl,setFl]=useState(null);
  const[watchOn,setWatchOn]=useState(false);const[rMsg,setRMsg]=useState(null);const[sv,setSv]=useState(1);const[soundOn,setSoundOn]=useState(true);
  const[roomId,setRoomId]=useState(null);

  const mR=useRef(null);const hR=useRef([]);const p1R=useRef(p1);const p2R=useRef(p2);

  const bc=useCallback((ms,elapsed)=>{LS.send({m:ms,n1:p1R.current,n2:p2R.current,el:Math.round((elapsed||elR.current)/1000)})},[]);

  const score=useCallback((p,src)=>{const c=mR.current;if(!c||c.over)return;vib(30);setHist(h=>[...h,clone(c)]);const n=pt(c,p);setM(n);setFl(p);setTimeout(()=>setFl(null),350);WR.update(watchScore(n,p1R.current,p2R.current),p1R.current,p2R.current);Ump.ann(c,n,p1R.current,p2R.current);bc(n);if(src)flash(src);if(n.over)setTimeout(()=>{clearInterval(ti.current);wl.current?.release();WR.stop();setWatchOn(false);setScr("final")},1800)},[bc]);
  const undo=useCallback((src)=>{const h=hR.current;if(!h.length)return;vib(20);const prev=h[h.length-1];setM(prev);setHist(x=>x.slice(0,-1));Ump.say("Correction");bc(prev);if(src)flash(src)},[bc]);

  useEffect(()=>{Ump.on=soundOn;if(!soundOn)speechSynthesis?.cancel()},[soundOn]);

  };

  const reset=()=>{clearInterval(ti.current);WR.stop();setWatchOn(false);wl.current?.release();speechSynthesis?.cancel();LS.destroy();setRoomId(null);setScr("setup")};
  useEffect(()=>()=>{clearInterval(ti.current);WR.stop();wl.current?.release();speechSynthesis?.cancel();LS.destroy()},[]);
  const sw=m?chkSw(m):false;
  const fL=()=>{const p=[];if(setLen!==6)p.push(`Set ${setLen}`);if(noAd)p.push("No-Ad");if(matchTB)p.push("MTB");return p.length?p.join(" · "):"Standard"};

    {showShare&&m&&<ShareSheet m={m} p1={p1} p2={p2} el={el} roomId={roomId} onClose={()=>setShowShare(false)}/>}

    {scr==="setup"&&<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28,overflow:"auto",animation:"fadeIn .5s ease"}}>
      <div style={{width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,rgba(200,255,0,.12),rgba(200,255,0,.04))",border:"1px solid rgba(200,255,0,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,marginBottom:12}}>🎾</div>
      <h1 style={{fontSize:26,fontWeight:900,letterSpacing:-.5,marginBottom:3}}>Tennis Score</h1>
      <p style={{color:"var(--text3)",fontSize:10,fontFamily:"var(--mono)",letterSpacing:3,marginBottom:28}}>SMART SCOREBOARD</p>
      <div style={{width:"100%",maxWidth:340}}>
        {[{l:"PLAYER 1",v:p1,s:setP1},{l:"PLAYER 2",v:p2,s:setP2}].map((f,i)=><div key={i} style={{marginBottom:12}}><label style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:2,display:"block",marginBottom:4}}>{f.l}</label><input value={f.v} onChange={e=>f.s(e.target.value)} onFocus={e=>{e.target.style.borderColor=L}} onBlur={e=>{e.target.style.borderColor="var(--border)"}} style={{width:"100%",padding:"13px 16px",borderRadius:12,background:"var(--card)",border:"1.5px solid var(--border)",color:"var(--text)",fontSize:16,fontWeight:600}}/></div>)}
        <div style={{marginTop:16,marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}><span style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:2}}>MATCH FORMAT</span><button onClick={()=>setShowHelp(true)} style={{width:24,height:24,borderRadius:12,background:"rgba(255,255,255,.05)",border:"1px solid var(--border)",color:"var(--text3)",fontSize:12,fontWeight:700,fontFamily:"var(--mono)",display:"flex",alignItems:"center",justifyContent:"center"}}>?</button></div>
          <div style={{marginBottom:10}}><label style={{fontSize:11,color:"var(--text2)",fontWeight:600,display:"block",marginBottom:5}}>Set Length</label><Seg options={[{v:4,l:"4"},{v:6,l:"6"},{v:8,l:"8 Pro"}]} value={setLen} onChange={setSetLen}/></div>
          <div style={{marginBottom:10}}><label style={{fontSize:11,color:"var(--text2)",fontWeight:600,display:"block",marginBottom:5}}>Deuce</label><Seg options={[{v:false,l:"Advantage"},{v:true,l:"No-Ad"}]} value={noAd} onChange={setNoAd}/></div>
          <div><label style={{fontSize:11,color:"var(--text2)",fontWeight:600,display:"block",marginBottom:5}}>Final Set</label><Seg options={[{v:false,l:"Normal"},{v:true,l:"Match TB (10)"}]} value={matchTB} onChange={setMatchTB}/></div>
        </div>
        <button onClick={()=>setScr("toss")} style={{width:"100%",padding:17,borderRadius:14,background:L,color:BG,fontWeight:800,fontSize:16}}>Continue</button>
      </div>
    </div>}

    {scr==="toss"&&<CoinToss p1={p1} p2={p2} onResult={onToss}/>}
    {scr==="watch"&&<WatchConnect p1={p1} p2={p2} onReady={onWatch}/>}

    {scr==="match"&&m&&<div style={{flex:1,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"12px 16px 8px",display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:"var(--mono)"}}>
        <span style={{fontSize:16,fontWeight:700,color:"var(--text2)"}}>{fmt(el)}</span>
        <div style={{textAlign:"center"}}><div style={{color:m.mtb?L:m.tb?L:m.deuce?"#FF9F0A":"var(--text2)",fontWeight:700,fontSize:13,letterSpacing:1}}>{m.mtb?"MATCH TIEBREAK":m.tb?"TIEBREAK":m.deuce?"DEUCE":m.adv?"ADVANTAGE":`SET ${m.sets.length+1}`}</div>{!m.over&&!m.deuce&&<div style={{color:L,fontSize:20,fontWeight:900,marginTop:2}}>{scoreText(m,p1,p2)}</div>}</div>
        <span style={{fontSize:16,fontWeight:700,color:"var(--text2)"}}>PT {m.pn}</span>
      </div>
      {rMsg&&<div style={{textAlign:"center",paddingBottom:4}}><Badge color={L} bg="rgba(200,255,0,.1)" style={{animation:"popIn .2s ease"}}>{rMsg}</Badge></div>}
      {sw&&<div style={{margin:"0 16px 6px",padding:"10px 16px",borderRadius:10,background:"rgba(200,255,0,.08)",border:"1px solid rgba(200,255,0,.15)",display:"flex",alignItems:"center",gap:10,animation:"slideDown .3s ease"}}><Icon d={I.swap} size={18} color={L}/><span style={{fontSize:13,fontWeight:700,color:L}}>Change Ends</span></div>}
      {m.sets.length>0&&<div style={{display:"flex",justifyContent:"center",gap:12,padding:"4px 16px 8px"}}>{m.sets.map((s,i)=><div key={i} style={{background:"var(--card)",borderRadius:8,padding:"4px 12px",display:"flex",gap:6,alignItems:"center"}}>{s.mtb&&<span style={{fontSize:8,color:L,fontFamily:"var(--mono)"}}>TB</span>}<span style={{fontSize:13,fontWeight:700,color:s.a>s.b?L:"var(--text3)",fontFamily:"var(--mono)"}}>{s.a}</span><span style={{fontSize:10,color:"var(--border)"}}>{"\u2013"}</span><span style={{fontSize:13,fontWeight:700,color:s.b>s.a?L:"var(--text3)",fontFamily:"var(--mono)"}}>{s.b}</span></div>)}</div>}
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 10px"}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[1,2].map(pl=>{const srv=m.server===pl,pts=gp(m,pl),isAdv=m.adv&&m.advP===pl,tapped=fl===pl;return<div key={pl} onClick={()=>score(pl)} style={{background:tapped?"rgba(200,255,0,.08)":"var(--card)",borderRadius:22,padding:"20px 16px 18px",textAlign:"center",position:"relative",transition:"background .15s, transform .1s",transform:tapped?"scale(.97)":"scale(1)",border:srv?`2px solid rgba(200,255,0,.5)`:`2px solid ${isAdv?"rgba(200,255,0,.2)":"var(--border)"}`,cursor:"pointer",WebkitUserSelect:"none",userSelect:"none"}}>
          {srv&&<div style={{position:"absolute",top:12,right:14,width:8,height:8,borderRadius:"50%",background:L,boxShadow:`0 0 10px ${L}`}}/>}
          <div style={{color:srv?L:"var(--text)",fontWeight:800,fontSize:16,marginBottom:12,letterSpacing:-.3}}>{pl===1?p1:p2}</div>
          <div style={{display:"flex",justifyContent:"center",gap:22,marginBottom:14}}><div><div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:2,marginBottom:4}}>SETS</div><div style={{fontSize:20,fontWeight:800}}>{pl===1?m.s1:m.s2}</div></div><div style={{width:1,background:"var(--border)"}}/><div><div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:2,marginBottom:4}}>{m.mtb?"MTB":"GAMES"}</div><div style={{fontSize:20,fontWeight:800}}>{m.mtb?(pl===1?m.mtb1:m.mtb2):(pl===1?m.g1:m.g2)}</div></div></div>
          <div style={{fontSize:76,fontWeight:900,lineHeight:1,color:pts==="AD"?L:"var(--text)",textShadow:tapped?"0 0 20px rgba(200,255,0,.3)":"none"}}>{pts}</div>
          {srv&&<div style={{fontSize:9,color:L,fontFamily:"var(--mono)",marginTop:10,letterSpacing:2,fontWeight:600}}>SERVING</div>}
        </div>})}
      </div></div>
      <div style={{padding:"8px 12px 14px",paddingBottom:"max(14px, env(safe-area-inset-bottom))"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto 1fr",gap:6,alignItems:"center"}}>
          <button onClick={()=>undo()} disabled={!hist.length} style={{padding:"13px 0",borderRadius:12,background:"var(--card)",border:"1px solid var(--border)",color:hist.length?"var(--text2)":"var(--border)",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6,opacity:hist.length?1:.4}}><Icon d={I.undo} size={15} color={hist.length?"var(--text2)":"var(--border)"}/>Undo</button>
          <button onClick={()=>setShowEdit(true)} style={{width:40,height:40,borderRadius:20,background:"var(--card)",border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon d={I.edit} size={14} color="var(--text3)"/></button>
          <button onClick={()=>setSoundOn(x=>!x)} style={{width:48,height:48,borderRadius:24,background:soundOn?"rgba(200,255,0,.1)":"var(--card)",border:`1.5px solid ${soundOn?"rgba(200,255,0,.25)":"var(--border)"}`,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon d={soundOn?I.sound_on:I.sound_off} size={18} color={soundOn?L:"var(--text3)"}/></button>
          <button onClick={()=>setShowShare(true)} style={{width:40,height:40,borderRadius:20,background:"var(--card)",border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon d={I.share} size={14} color="var(--text3)"/></button>
          <button onClick={end} style={{padding:"13px 0",borderRadius:12,background:"var(--card)",border:"1px solid var(--border)",color:"var(--text3)",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Icon d={I.end} size={14} color="var(--text3)"/>End</button>
        </div>
      </div>
    </div>}

    {scr==="final"&&m&&<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,animation:"fadeIn .5s ease"}}>
      <div style={{fontSize:56,marginBottom:12}}>🏆</div>
      <h2 style={{color:L,fontSize:26,fontWeight:900,marginBottom:4}}>{m.winner?`${m.winner===1?p1:p2} Wins!`:"Match Ended"}</h2>
      <p style={{color:"var(--text3)",fontSize:13,marginBottom:20,fontFamily:"var(--mono)"}}>{fmt(el)} duration</p>
      <div style={{width:"100%",maxWidth:340,background:"var(--card)",borderRadius:16,padding:20,marginBottom:16}}><table style={{width:"100%",borderCollapse:"collapse",fontFamily:"var(--mono)",fontSize:13}}><thead><tr style={{color:"var(--text3)",fontSize:10,letterSpacing:2}}><th style={{textAlign:"left",padding:"0 0 12px",fontWeight:500}}>PLAYER</th>{m.sets.map((_,i)=><th key={i} style={{textAlign:"center",padding:"0 0 12px",fontWeight:500}}>{_.mtb?"MTB":`S${i+1}`}</th>)}</tr></thead><tbody>{[1,2].map(pl=><tr key={pl}><td style={{fontWeight:700,color:m.winner===pl?L:"var(--text)",padding:"6px 0"}}>{pl===1?p1:p2}</td>{m.sets.map((s,i)=>{const v=pl===1?s.a:s.b;return<td key={i} style={{textAlign:"center",fontWeight:700,fontSize:18,color:(pl===1?s.a>s.b:s.b>s.a)?"var(--text)":"var(--text3)",padding:"6px 0"}}>{v}</td>})}</tr>)}</tbody></table></div>
      <div style={{display:"flex",gap:8,width:"100%",maxWidth:340,marginBottom:16}}>{[1,2].map(pl=>{const t=pl===1?m.t1:m.t2;const o=pl===1?m.t2:m.t1;return<div key={pl} style={{flex:1,background:"var(--card)",padding:14,borderRadius:12,textAlign:"center"}}><div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:2,marginBottom:4}}>TOTAL PTS</div><div style={{fontSize:22,fontWeight:800,color:t>o?"var(--text)":"var(--text3)"}}>{t}</div><div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{pl===1?p1:p2}</div></div>})}</div>
      <button onClick={()=>setShowShare(true)} style={{width:"100%",maxWidth:340,padding:14,borderRadius:12,background:"var(--card)",border:"1px solid var(--border)",color:"var(--text2)",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:10}}><Icon d={I.share} size={16} color="var(--text2)"/>Share Result</button>
      <button onClick={reset} style={{width:"100%",maxWidth:340,padding:17,borderRadius:14,background:L,color:BG,fontWeight:800,fontSize:16}}>New Match</button>
    </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
