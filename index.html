    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800;900&display=swap');
    :root{--lime:#C8FF00;--bg:#07090A;--card:#151718;--card2:#1c1e20;--border:#2a2d30;--text:#fff;--text2:#b8bcc0;--text3:#6e7278;--font:'Outfit',sans-serif;--mono:'DM Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;overscroll-behavior:none;background:var(--bg);font-family:var(--font)}
    #root{height:100%;height:100dvh}
    button{border:none;font-family:var(--font);cursor:pointer;-webkit-appearance:none}
    button:active{transform:scale(.97);transition:transform .1s}
    input{font-family:var(--font);-webkit-appearance:none}input:focus{outline:none}input::placeholder{color:#888c90;font-weight:600}
    ::selection{background:rgba(200,255,0,.3)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes glow{0%,100%{box-shadow:0 0 16px rgba(200,255,0,.15)}50%{box-shadow:0 0 32px rgba(200,255,0,.35)}}
    @keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
  </style>

host(cb){if(this.peer)return;this.roomId=this.genId();try{this.peer=new Peer(this.roomId,this._cfg());this.peer.on('open',()=>cb?.(this.roomId));this.peer.on('connection',c=>{c.on('open',()=>{this.conns.push(c);if(this.lastState)try{c.send(this.lastState)}catch{}});c.on('close',()=>{this.conns=this.conns.filter(x=>x!==c)});c.on('error',()=>{this.conns=this.conns.filter(x=>x!==c)})});this.peer.on('disconnected',()=>{setTimeout(()=>{try{this.peer?.reconnect()}catch{}},2000)});this.peer.on('error',e=>{if(e.type==='disconnected'||e.type==='network')setTimeout(()=>{try{this.peer?.reconnect()}catch{}},3000)})}catch{}},
send(d){this.lastState=d;const dead=[];this.conns.forEach(c=>{try{if(c.open)c.send(d);else dead.push(c)}catch{dead.push(c)}});if(dead.length)this.conns=this.conns.filter(c=>!dead.includes(c))},
join(id,onData,onOk,onErr){let retries=0;const maxRetries=20;const self=this;self._destroyed=false;function attempt(){if(self._destroyed)return;try{const pid='tv_'+self.genId()+Math.random().toString(36).slice(2,6);self.peer=new Peer(pid,self._cfg());self.peer.on('open',()=>{if(self._destroyed){self.peer.destroy();return}const c=self.peer.connect(id,{reliable:true,serialization:'json'});const timeout=setTimeout(()=>{retry()},15000);c.on('open',()=>{clearTimeout(timeout);retries=0;onOk?.()});c.on('data',d=>onData?.(d));c.on('close',()=>{clearTimeout(timeout);retry()});c.on('error',()=>{clearTimeout(timeout);retry()})});self.peer.on('error',e=>{if(e.type==='peer-unavailable'&&retries>=3)onErr?.(e.type);retry()});self.peer.on('disconnected',()=>retry())}catch{onErr?.('fail')}}function retry(){retries++;if(retries>maxRetries){onErr?.('max-retries');return}const delay=Math.min(1500+1000*retries,10000);setTimeout(()=>{try{self.peer?.destroy()}catch{}if(!self._destroyed)attempt()},delay)}attempt()},
destroy(){this._destroyed=true;try{this.peer?.destroy()}catch{}this.peer=null;this.conns=[];this.roomId=null;this.lastState=null}};

/* TENNIS ENGINE */
const vib=p=>{try{navigator.vibrate?.(p)}catch{}};
const fmt=ms=>{const s=Math.floor(ms/1000);return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0")};
const clone=o=>JSON.parse(JSON.stringify(o));
function fresh(sv,cfg){return{p1:0,p2:0,g1:0,g2:0,s1:0,s2:0,sets:[],t1:0,t2:0,tb:false,tb1:0,tb2:0,mtb:false,mtb1:0,mtb2:0,deuce:false,adv:false,advP:null,over:false,winner:null,server:sv,pn:0,cfg}}
function wg(s,p){const SL=s.cfg.setLen;if(p===1)s.g1++;else s.g2++;s.p1=0;s.p2=0;s.deuce=false;s.adv=false;s.advP=null;s.tb1=0;s.tb2=0;s.tb=false;s.server=s.server===1?2:1;if(s.g1>=SL&&s.g1-s.g2>=2)return wst(s,1);if(s.g2>=SL&&s.g2-s.g1>=2)return wst(s,2);if(s.g1===SL&&s.g2===SL)s.tb=true;return s}
function wst(s,p){s.sets.push({a:s.g1,b:s.g2});if(p===1)s.s1++;else s.s2++;s.g1=0;s.g2=0;if(s.s1>=2){s.over=true;s.winner=1;return s}if(s.s2>=2){s.over=true;s.winner=2;return s}if(s.cfg.matchTB&&s.s1===1&&s.s2===1)s.mtb=true;return s}
function pt(prev,p){const s=clone(prev);if(s.over)return s;s.pn++;if(p===1)s.t1++;else s.t2++;if(s.mtb){if(p===1)s.mtb1++;else s.mtb2++;s.p1=s.mtb1;s.p2=s.mtb2;if((s.mtb1+s.mtb2)%2===1)s.server=s.server===1?2:1;if(s.mtb1>=10&&s.mtb1-s.mtb2>=2){s.sets.push({a:s.mtb1,b:s.mtb2,mtb:true});s.over=true;s.winner=1}if(s.mtb2>=10&&s.mtb2-s.mtb1>=2){s.sets.push({a:s.mtb1,b:s.mtb2,mtb:true});s.over=true;s.winner=2}return s}if(s.tb){if(p===1)s.tb1++;else s.tb2++;s.p1=s.tb1;s.p2=s.tb2;if((s.tb1+s.tb2)%2===1)s.server=s.server===1?2:1;if(s.tb1>=7&&s.tb1-s.tb2>=2)return wg(s,1);if(s.tb2>=7&&s.tb2-s.tb1>=2)return wg(s,2);return s}if(s.cfg.noAd&&s.p1>=3&&s.p2>=3)return wg(s,p);if(s.p1>=3&&s.p2>=3){if(s.adv){if(s.advP===p)return wg(s,p);s.adv=false;s.advP=null;s.deuce=true;return s}if(s.deuce||(s.p1===3&&s.p2===3)){s.deuce=false;s.adv=true;s.advP=p;return s}}if(p===1)s.p1++;else s.p2++;if(s.p1>=4)return wg(s,1);if(s.p2>=4)return wg(s,2);if(s.p1===3&&s.p2===3)s.deuce=true;return s}
function gp(m,p){if(m.mtb)return p===1?String(m.mtb1):String(m.mtb2);if(m.tb)return p===1?String(m.tb1):String(m.tb2);if(m.deuce)return"40";if(m.adv)return m.advP===p?"AD":"40";const v=p===1?m.p1:m.p2;return PTS[v]||String(v)}
function scoreText(m,n1,n2){if(m.over)return(m.winner===1?n1:n2)+" wins!";if(m.mtb)return m.server===1?`${m.mtb1}\u2013${m.mtb2}`:`${m.mtb2}\u2013${m.mtb1}`;if(m.tb)return m.server===1?`${m.tb1}\u2013${m.tb2}`:`${m.tb2}\u2013${m.tb1}`;if(m.deuce)return"Deuce";if(m.adv)return`AD ${m.advP===1?n1:n2}`;const a=PTS[m.p1],b=PTS[m.p2];return m.server===1?`${a}\u2013${b}`:`${b}\u2013${a}`}
function watchScore(m,n1,n2){if(m.over)return(m.winner===1?n1:n2)+" wins!";if(m.mtb)return`${m.mtb1}\u2013${m.mtb2}`;if(m.tb)return`${m.tb1}\u2013${m.tb2}`;if(m.deuce)return"Deuce";if(m.adv)return`AD ${m.advP===1?n1:n2}`;return`${PTS[m.p1]||m.p1}\u2013${PTS[m.p2]||m.p2}`}
function chkSw(m){if(m.over)return false;if(m.mtb){const x=m.mtb1+m.mtb2;return x>0&&x%6===0}if(m.tb){const x=m.tb1+m.tb2;return x>0&&x%6===0}const g=m.g1+m.g2;return g>0&&g%2!==0&&m.p1===0&&m.p2===0}

/* UMPIRE */
const Ump={on:true,say(t,d=0){if(!this.on||!('speechSynthesis'in window))return;setTimeout(()=>{const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;u.pitch=.85;const v=speechSynthesis.getVoices();const p=v.find(x=>x.name.includes('Samantha')||x.name.includes('Daniel')||x.name.includes('Karen'))||v.find(x=>x.lang.startsWith('en')&&!x.name.includes('Google'))||v.find(x=>x.lang.startsWith('en'));if(p)u.voice=p;speechSynthesis.cancel();speechSynthesis.speak(u)},d)},ann(prev,next,n1,n2){if(!this.on)return;if(next.over&&!prev.over){this.say(`Game, set, match. ${next.winner===1?n1:n2}`);return}if(next.mtb){if(!prev.mtb){this.say("One set all. Match tiebreak");return}const t=`${next.mtb1}, ${next.mtb2}`;this.say(chkSw(next)?t+". Change ends":t);return}if(next.sets.length>prev.sets.length){const ls=next.sets.at(-1);this.say(`Game and set, ${ls.a>ls.b?n1:n2}. ${ls.a}, ${ls.b}`);return}const pg=prev.g1+prev.g2,ng=next.g1+next.g2;if(ng>pg||(pg>0&&ng===0&&next.sets.length===prev.sets.length)){if(next.tb&&!prev.tb){this.say(`${next.cfg.setLen} all. Tiebreak`);return}this.say(`Game. ${next.g1}, ${next.g2}`);if(chkSw(next))this.say("Change ends",2000);return}if(next.tb){const t=`${next.tb1}, ${next.tb2}`;this.say(chkSw(next)?t+". Change ends":t);return}if(next.deuce){this.say("Deuce");return}if(next.adv){this.say(`Advantage, ${next.advP===1?n1:n2}`);return}const a=PTS[next.p1],b=PTS[next.p2];if(a===b&&a!=="0")this.say(`${a} all`);else if(next.server===1)this.say(`${a}. ${b}`);else this.say(`${b}. ${a}`)}};

function fmtMsg(m,p1,p2,el){let l=[`${p1} vs ${p2}`];if(m.sets?.length>0)l.push(m.sets.map(s=>s.mtb?`TB:${s.a}\u2013${s.b}`:`${s.a}\u2013${s.b}`).join('  '));if(m.over)l.push(`${m.winner===1?p1:p2} wins!`);else{l.push(`Set ${m.sets.length+1}: ${m.g1}\u2013${m.g2}`);if(m.deuce)l.push('Deuce');else if(m.adv)l.push(`AD ${m.advP===1?p1:p2}`);else l.push(`Points: ${scoreText(m,p1,p2)}`);l.push(`${m.server===1?p1:p2} serving`)}l.push(`${fmt(el)}`);l.push('');l.push(`Tennis Score — APP_LINK`);return l.join('\n')}

/* SHARE (live link + text) */

  const shareText=async()=>{if(navigator.share){try{await navigator.share({text:msg});onClose();return}catch{}}try{await navigator.clipboard.writeText(msg);setCp(true);setTimeout(()=>{setCp(false);onClose()},1500)}catch{}};
  const shareLive=async()=>{const t=`Watch live:\n${liveUrl}\n\nTennis Score — APP_LINK`;if(navigator.share){try{await navigator.share({text:t});return}catch{}}try{await navigator.clipboard.writeText(liveUrl);setCp(true);setTimeout(()=>setCp(false),1500)}catch{}};
  return<Sheet onClose={onClose} ch={<>
    <h3 style={{fontSize:18,fontWeight:800,marginBottom:10}}>Share Score</h3>
    {liveUrl&&<div style={{background:"rgba(200,255,0,.05)",border:"1px solid rgba(200,255,0,.15)",borderRadius:12,padding:14,marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{width:6,height:6,borderRadius:3,background:L,animation:"pulse 1.5s infinite"}}/><span style={{fontSize:13,fontWeight:700,color:L}}>Live Scoreboard</span></div>
      <p style={{fontSize:12,color:"var(--text2)",marginBottom:12,lineHeight:1.6}}>Opponent opens this link — sees live score on phone, watch, and headphones.</p>
      <button onClick={shareLive} style={{width:"100%",padding:14,borderRadius:12,background:L,color:BG,fontWeight:800,fontSize:15}}>{cp?"Copied!":"Share Live Link"}</button>
    </div>}
    <div style={{background:"var(--card)",borderRadius:12,padding:14,marginBottom:14,fontFamily:"var(--mono)",fontSize:12,color:"var(--text2)",lineHeight:1.7,whiteSpace:"pre-line"}}>{msg}</div>
    <button onClick={shareText} style={{width:"100%",padding:14,borderRadius:12,background:"var(--card)",border:"1.5px solid var(--border)",color:"var(--text)",fontWeight:700,fontSize:15}}>{cp?"Copied!":(navigator.share?"Share as Text":"Copy Text")}</button>
  </>}/>;
}

/* SPECTATOR VIEW */
function SpectatorView(){
  const roomId=new URLSearchParams(window.location.search).get('join');
  const[st,setSt]=useState('connecting');
  const[data,setData]=useState(null);
  const[soundOn,setSoundOn]=useState(false);
  const[watchOn,setWatchOn]=useState(false);
  useEffect(()=>{LS.join(roomId,d=>{setSt('live');setData(prev=>{if(prev&&d.m&&prev.m&&Ump.on)Ump.ann(prev.m,d.m,d.n1,d.n2);if(WR.active&&d.m)WR.update(watchScore(d.m,d.n1,d.n2),d.n1,d.n2);return d})},()=>setSt('live'),()=>setSt('error'));return()=>LS.destroy()},[roomId]);
  useEffect(()=>{Ump.on=soundOn;if(!soundOn)speechSynthesis?.cancel()},[soundOn]);
  const actWatch=()=>{if(!data)return;setWatchOn(WR.activate(data.n1,data.n2))};

  if(st==='connecting')return<div style={{fontFamily:"var(--font)",height:"100%",background:"var(--bg)",color:"var(--text)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,paddingTop:"env(safe-area-inset-top, 0px)"}}><div style={{width:32,height:32,border:"3px solid var(--border)",borderTopColor:L,borderRadius:"50%",animation:"spin .7s linear infinite"}}/><p style={{color:"var(--text2)",fontSize:15,fontWeight:600}}>Connecting...</p><p style={{color:"var(--text3)",fontSize:12,fontFamily:"var(--mono)"}}>Room: {roomId}</p></div>;
  if(st==='error'||!data)return<div style={{fontFamily:"var(--font)",height:"100%",background:"var(--bg)",color:"var(--text)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:24,paddingTop:"env(safe-area-inset-top, 0px)"}}><span style={{fontSize:40}}>📡</span><h2 style={{fontSize:20,fontWeight:800}}>Cannot Connect</h2><p style={{color:"var(--text2)",fontSize:14,textAlign:"center"}}>Match not found. Ask scorer for a new link.</p><button onClick={()=>window.location.href=window.location.pathname} style={{marginTop:12,padding:"14px 32px",borderRadius:12,background:L,color:BG,fontWeight:800}}>Open Scorer</button></div>;

  const{m,n1,n2,el}=data;

/* COIN TOSS */
function CoinToss({p1,p2,onResult}){const[ph,setPh]=useState("idle");const[res,setRes]=useState(null);const toss=()=>{vib(40);setPh("spin");const w=Math.random()<.5?1:2;setTimeout(()=>{setRes(w);setPh("done");vib([20,60,20])},1500)};return<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:24,width:"100%",height:"100%",animation:"fadeIn .4s ease"}}>{ph==="idle"&&<p style={{color:"var(--text2)",fontSize:16,fontWeight:600}}>Tap the ball to toss</p>}{ph==="spin"&&<p style={{color:"var(--text2)",fontSize:16,fontWeight:600}}>Tossing...</p>}<div onClick={ph==="idle"?toss:ph==="done"?()=>onResult(res):undefined} style={{width:ph==="done"?140:110,height:ph==="done"?140:110,borderRadius:"50%",background:ph==="spin"?"conic-gradient(#C8FF00,#07090A,#C8FF00,#07090A,#C8FF00)":res?"linear-gradient(135deg,#C8FF00,#8BA600)":"var(--card)",border:`2.5px solid ${res?L:"var(--border)"}`,display:"flex",alignItems:"center",justifyContent:"center",animation:ph==="spin"?"spin .3s linear infinite":ph==="done"?"glow 2s infinite":"none",cursor:"pointer",boxShadow:res?"0 0 40px rgba(200,255,0,.25)":"0 8px 32px rgba(0,0,0,.4)",transition:ph==="spin"?"none":"all .5s"}}>{ph!=="done"?<TennisBall size={36}/>:<div style={{textAlign:"center"}}><div style={{fontSize:14,fontWeight:900,color:BG,maxWidth:110,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{res===1?p1:p2}</div><div style={{fontSize:18,fontWeight:900,color:BG,fontFamily:"var(--mono)",letterSpacing:3,marginTop:6}}>START</div></div>}</div>{ph==="idle"&&<div style={{width:"100%",maxWidth:300}}><p style={{fontSize:11,color:"var(--text2)",fontFamily:"var(--mono)",textAlign:"center",marginBottom:10,letterSpacing:2,fontWeight:600}}>OR PICK MANUALLY</p><div style={{display:"flex",gap:8}}>{[1,2].map(pl=><button key={pl} onClick={()=>onResult(pl)} style={{flex:1,padding:"14px 0",background:"var(--card)",border:"1.5px solid var(--border)",borderRadius:12,color:"var(--text)",fontSize:15,fontWeight:700}}>{pl===1?p1:p2}</button>)}</div></div>}</div>}

ion:"absolute",top:-11,left:"50%",transform:"translateX(-50%)",width:32,height:11,borderRadius:"5px 5px 0 0",background:"var(--card2)",border:"1px solid var(--border)",borderBottom:"none"}}/><div style={{position:"absolute",bottom:-11,left:"50%",transform:"translateX(-50%)",width:32,height:11,borderRadius:"0 0 5px 5px",background:"var(--card2)",border:"1px solid var(--border)",borderTop:"none"}}/><div style={{position:"absolute",right:-7,top:"50%",transform:"translateY(-50%)",width:5,height:16,borderRadius:3,background:"#333"}}/><div style={{display:"flex",gap:6}}>{[{i:I.skip_prev,c:L},{i:I.pause,c:"#FF9F0A"},{i:I.skip_next,c:L}].map((b,i)=><div key={i} style={{width:22,height:22,borderRadius:5,background:"rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon d={b.i} size={11} color={b.c}/></div>)}</div></div>}
<h2 style={{fontSize:20,fontWeight:800,marginBottom:24}}>{st==="ok"?"Watch Connected":st==="busy"?"Activating...":st==="fail"?"Could not start audio":""}</h2>{st==="ok"&&<div style={{background:"var(--card)",borderRadius:14,padding:16,marginBottom:24,width:"100%",maxWidth:300}}><p style={{fontSize:10,color:"var(--text2)",fontFamily:"var(--mono)",letterSpacing:2,marginBottom:12,fontWeight:600}}>WATCH CONTROLS</p><div style={{display:"flex",flexDirection:"column",gap:10}}>{[{i:I.skip_prev,l:"Previous",d:`Point ${p1}`,c:L},{i:I.skip_next,l:"Next",d:`Point ${p2}`,c:L},{i:I.pause,l:"Pause",d:"Undo",c:"#FF9F0A"}].map((r,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:34,height:34,borderRadius:8,background:"rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon d={r.i} size={16} color={r.c}/></div><div><span style={{fontSize:13,fontWeight:600}}>{r.l}</span><span style={{fontSize:12,color:"var(--text3)",marginLeft:8}}>{r.d}</span></div></div>)}</div></div>}{st==="idle"&&<div style={{width:"100%",maxWidth:300,display:"flex",flexDirection:"column",gap:10}}><button onClick={con} style={{width:"100%",padding:16,borderRadius:14,background:L,color:BG,fontWeight:800,fontSize:15}}>Activate Smartwatch</button><button onClick={()=>onReady(false)} style={{width:"100%",padding:14,borderRadius:14,background:"var(--card)",border:"1.5px solid var(--border)",color:"var(--text)",fontWeight:700,fontSize:15}}>Skip — without watch</button></div>}{st==="ok"&&<button onClick={()=>onReady(true)} style={{width:"100%",maxWidth:300,padding:16,borderRadius:14,background:L,color:BG,fontWeight:800,fontSize:15,animation:"glow 2s infinite"}}>Start Match</button>}{st==="fail"&&<div style={{display:"flex",gap:10,width:"100%",maxWidth:300}}><button onClick={con} style={{flex:1,padding:"14px 0",background:"var(--card)",border:"1.5px solid var(--border)",borderRadius:12,color:"var(--text)",fontWeight:700,fontSize:15}}>Retry</button><button onClick={()=>onReady(false)} style={{flex:1,padding:"14px 0",background:L,borderRadius:12,color:BG,fontWeight:800,fontSize:15}}>Without watch</button></div>}</div>}

/* MAIN APP */
function App(){
  if(new URLSearchParams(window.location.search).get('join'))return<SpectatorView/>;
  const[scr,setScr]=useState("setup");
  const[p1,setP1]=useState("Player 1");const[p2,setP2]=useState("Player 2");
  const[setLen,setSetLen]=useState(6);const[noAd,setNoAd]=useState(false);const[matchTB,setMatchTB]=useState(false);
  const[showHelp,setShowHelp]=useState(false);const[showEdit,setShowEdit]=useState(false);const[showShare,setShowShare]=useState(false);const[showMatchHelp,setShowMatchHelp]=useState(false);
  const[m,setM]=useState(null);const[hist,setHist]=useState([]);const[el,setEl]=useState(0);const[fl,setFl]=useState(null);
  const[watchOn,setWatchOn]=useState(false);const[rMsg,setRMsg]=useState(null);const[sv,setSv]=useState(1);const[soundOn,setSoundOn]=useState(true);
  const[roomId,setRoomId]=useState(null);
  const ti=useRef(null);const stt=useRef(null);const wl=useRef(null);const elR=useRef(0);
  const mR=useRef(null);const hR=useRef([]);const p1R=useRef(p1);const p2R=useRef(p2);
  mR.current=m;hR.current=hist;p1R.current=p1;p2R.current=p2;
  const cfg={setLen,noAd,matchTB};
  const flash=t=>{setRMsg(t);setTimeout(()=>setRMsg(null),2500)};
  const bc=useCallback((ms,elapsed)=>{LS.send({m:ms,n1:p1R.current,n2:p2R.current,el:Math.round((elapsed||elR.current)/1000)})},[]);

  const score=useCallback((p,src)=>{const c=mR.current;if(!c||c.over)return;vib(30);setHist(h=>[...h,clone(c)]);const n=pt(c,p);setM(n);setFl(p);setTimeout(()=>setFl(null),350);WR.update(watchScore(n,p1R.current,p2R.current),p1R.current,p2R.current);Ump.ann(c,n,p1R.current,p2R.current);bc(n);if(src)flash(src);if(n.over)setTimeout(()=>{clearInterval(ti.current);wl.current?.release();WR.stop();setWatchOn(false);setScr("final")},1800)},[bc]);
  const undo=useCallback((src)=>{const h=hR.current;if(!h.length)return;vib(20);const prev=h[h.length-1];setM(prev);setHist(x=>x.slice(0,-1));Ump.say("Correction");bc(prev);if(src)flash(src)},[bc]);

  useEffect(()=>{Ump.on=soundOn;if(!soundOn)speechSynthesis?.cancel()},[soundOn]);
  useEffect(()=>{speechSynthesis?.getVoices()},[]);
  const onToss=s=>{setSv(s);setScr("watch")};
  const onWatch=connected=>{
    setWatchOn(connected);
    if(connected){WR.onPrev=()=>score(1,"\u23EE "+p1R.current);WR.onNext=()=>score(2,"\u23ED "+p2R.current);WR.onPause=()=>undo("\u23F8 Undo")}
    const nm=fresh(sv,cfg);setM(nm);setHist([]);setEl(0);setScr("match");
    stt.current=Date.now();ti.current=setInterval(()=>{const e=Date.now()-stt.current;setEl(e);elR.current=e},1000);
    (async()=>{try{if("wakeLock"in navigator)wl.current=await navigator.wakeLock.request("screen")}catch{}})();
    Ump.say(`${sv===1?p1:p2} to serve. Play`,600);
    LS.host(id=>setRoomId(id));setTimeout(()=>bc(nm,0),2000);
  };
  const end=()=>{clearInterval(ti.current);WR.stop();setWatchOn(false);wl.current?.release();speechSynthesis?.cancel();setScr("final")};
  const reset=()=>{clearInterval(ti.current);WR.stop();setWatchOn(false);wl.current?.release();speechSynthesis?.cancel();LS.destroy();setRoomId(null);setP1("Player 1");setP2("Player 2");setScr("setup")};
  useEffect(()=>()=>{clearInterval(ti.current);WR.stop();wl.current?.release();speechSynthesis?.cancel();LS.destroy()},[]);
  const sw=m?chkSw(m):false;
  const fL=()=>{const p=[];if(setLen!==6)p.push(`Set ${setLen}`);if(noAd)p.push("No-Ad");if(matchTB)p.push("MTB");return p.length?p.join(" · "):"Standard"};

  return<div style={{fontFamily:"var(--font)",height:"100%",background:"var(--bg)",color:"var(--text)",display:"flex",flexDirection:"column",overflow:"hidden",paddingTop:"env(safe-area-inset-top, 0px)"}}>
    {showHelp&&<HelpSheet onClose={()=>setShowHelp(false)}/>}
    {showMatchHelp&&<MatchHelpSheet onClose={()=>setShowMatchHelp(false)}/>}
    {showEdit&&m&&<EditSheet m={m} p1={p1} p2={p2} onApply={nm=>{setHist(h=>[...h,clone(m)]);setM(nm);bc(nm)}} onClose={()=>setShowEdit(false)}/>}
    {showShare&&m&&<ShareSheet m={m} p1={p1} p2={p2} el={el} roomId={roomId} onClose={()=>setShowShare(false)}/>}

    {scr==="setup"&&<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28,overflow:"auto",animation:"fadeIn .5s ease"}}>
      <div style={{width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,rgba(200,255,0,.12),rgba(200,255,0,.04))",border:"1px solid rgba(200,255,0,.15)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:12}}><TennisBall size={30}/></div>
      <h1 style={{fontSize:26,fontWeight:900,letterSpacing:-.5,marginBottom:3}}>Tennis Score</h1>
      <p style={{color:"var(--text2)",fontSize:10,fontFamily:"var(--mono)",letterSpacing:3,marginBottom:28,fontWeight:500}}>SMART SCOREBOARD</p>
      <div style={{width:"100%",maxWidth:340}}>
        {[{ph:"Player 1 name",v:p1,s:setP1,def:"Player 1"},{ph:"Player 2 name",v:p2,s:setP2,def:"Player 2"}].map((f,i)=><div key={i} style={{marginBottom:12}}><input value={f.v===f.def?"":f.v} onChange={e=>f.s((e.target.value||f.def).slice(0,12))} onFocus={e=>{if(f.v===f.def)f.s("");e.target.style.borderColor=L}} onBlur={e=>{if(!f.v.trim())f.s(f.def);e.target.style.borderColor="rgba(255,255,255,.15)"}} placeholder={f.ph} maxLength={12} style={{width:"100%",padding:"15px 16px",borderRadius:12,background:"rgba(255,255,255,.06)",border:"1.5px solid rgba(255,255,255,.15)",color:"var(--text)",fontSize:16,fontWeight:700}}/></div>)}
        <div style={{marginTop:28,marginBottom:28}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><span style={{fontSize:11,color:"var(--text2)",fontFamily:"var(--mono)",letterSpacing:2,fontWeight:600}}>MATCH FORMAT</span><button onClick={()=>setShowHelp(true)} style={{width:26,height:26,borderRadius:13,background:"rgba(200,255,0,.08)",border:`1.5px solid rgba(200,255,0,.25)`,color:L,fontSize:13,fontWeight:800,fontFamily:"var(--mono)",display:"flex",alignItems:"center",justifyContent:"center",fontStyle:"italic"}}>i</button></div>
          <div style={{marginBottom:10}}><Seg options={[{v:4,l:"4"},{v:6,l:"6"},{v:8,l:"8 Pro"}]} value={setLen} onChange={setSetLen}/></div>
          <div style={{marginBottom:10}}><Seg options={[{v:false,l:"Advantage"},{v:true,l:"No-Ad"}]} value={noAd} onChange={setNoAd}/></div>
          <div><Seg options={[{v:false,l:"Normal"},{v:true,l:"Match TB (10)"}]} value={matchTB} onChange={setMatchTB}/></div>
        </div>
        <button onClick={()=>setScr("toss")} style={{width:"100%",padding:17,borderRadius:14,background:L,color:BG,fontWeight:800,fontSize:16}}>Continue</button>
      </div>
    </div>}

    {scr==="toss"&&<CoinToss p1={p1} p2={p2} onResult={onToss}/>}
    {scr==="watch"&&<WatchConnect p1={p1} p2={p2} onReady={onWatch}/>}

    {scr==="match"&&m&&<div style={{flex:1,display:"flex",flexDirection:"column",position:"relative"}}>
      <div style={{padding:"14px 16px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:"var(--mono)",background:"rgba(255,255,255,.03)",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><button onClick={()=>setShowMatchHelp(true)} style={{width:24,height:24,borderRadius:12,background:"rgba(200,255,0,.08)",border:"1.5px solid rgba(200,255,0,.25)",color:L,fontSize:12,fontWeight:800,fontFamily:"var(--mono)",display:"flex",alignItems:"center",justifyContent:"center",padding:0,fontStyle:"italic",flexShrink:0}}>i</button><span style={{fontSize:18,fontWeight:800,color:"var(--text)"}}>{fmt(el)}</span></div>
        <div style={{textAlign:"center"}}><div style={{color:m.mtb?L:m.tb?L:m.deuce?"#FF9F0A":"var(--text)",fontWeight:800,fontSize:14,letterSpacing:1}}>{m.mtb?"MATCH TIEBREAK":m.tb?"TIEBREAK":m.deuce?"DEUCE":m.adv?"ADVANTAGE":`SET ${m.sets.length+1}`}</div></div>
        <span style={{fontSize:18,fontWeight:800,color:"var(--text)"}}>PT {m.pn}</span>

      {sw&&<div style={{position:"absolute",top:60,left:16,right:16,zIndex:10,padding:"10px 16px",borderRadius:10,background:"rgba(200,255,0,.12)",border:"1px solid rgba(200,255,0,.25)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,animation:"slideDown .3s ease",backdropFilter:"blur(8px)"}}><Icon d={I.swap} size={18} color={L}/><span style={{fontSize:14,fontWeight:800,color:L}}>Change Ends</span></div>}
      {m.sets.length>0&&<div style={{display:"flex",justifyContent:"center",gap:12,padding:"4px 16px 8px"}}>{m.sets.map((s,i)=><div key={i} style={{background:"rgba(255,255,255,.06)",borderRadius:8,padding:"4px 12px",display:"flex",gap:6,alignItems:"center",border:"1px solid rgba(255,255,255,.08)"}}>{s.mtb&&<span style={{fontSize:8,color:L,fontFamily:"var(--mono)"}}>TB</span>}<span style={{fontSize:14,fontWeight:700,color:s.a>s.b?L:"var(--text2)",fontFamily:"var(--mono)"}}>{s.a}</span><span style={{fontSize:10,color:"var(--text3)"}}>{"\u2013"}</span><span style={{fontSize:14,fontWeight:700,color:s.b>s.a?L:"var(--text2)",fontFamily:"var(--mono)"}}>{s.b}</span></div>)}</div>}
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 10px"}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[1,2].map(pl=>{const srv=m.server===pl,pts=gp(m,pl),isAdv=m.adv&&m.advP===pl,tapped=fl===pl;return<div key={pl} onClick={()=>score(pl)} style={{background:tapped?"rgba(200,255,0,.08)":"var(--card)",borderRadius:22,padding:"20px 16px 18px",textAlign:"center",position:"relative",transition:"background .15s, transform .1s",transform:tapped?"scale(.97)":"scale(1)",border:srv?`2px solid rgba(200,255,0,.5)`:`2px solid ${isAdv?"rgba(200,255,0,.2)":"rgba(255,255,255,.1)"}`,cursor:"pointer",WebkitUserSelect:"none",userSelect:"none"}}>
          {srv&&<div style={{position:"absolute",top:12,right:14,width:8,height:8,borderRadius:"50%",background:L,boxShadow:`0 0 10px ${L}`}}/>}
          <div style={{color:srv?L:"var(--text)",fontWeight:800,fontSize:16,marginBottom:12,letterSpacing:-.3}}>{pl===1?p1:p2}</div>
          <div style={{display:"flex",justifyContent:"center",gap:22,marginBottom:14}}><div><div style={{fontSize:9,color:"var(--text2)",fontFamily:"var(--mono)",letterSpacing:2,marginBottom:4}}>SETS</div><div style={{fontSize:20,fontWeight:800}}>{pl===1?m.s1:m.s2}</div></div><div style={{width:1,background:"var(--border)"}}/><div><div style={{fontSize:9,color:"var(--text2)",fontFamily:"var(--mono)",letterSpacing:2,marginBottom:4}}>{m.mtb?"MTB":"GAMES"}</div><div style={{fontSize:20,fontWeight:800}}>{m.mtb?(pl===1?m.mtb1:m.mtb2):(pl===1?m.g1:m.g2)}</div></div></div>
          <div style={{fontSize:76,fontWeight:900,lineHeight:1,color:pts==="AD"?L:"var(--text)",textShadow:tapped?"0 0 20px rgba(200,255,0,.3)":"none"}}>{pts}</div>
          {srv&&<div style={{fontSize:9,color:L,fontFamily:"var(--mono)",marginTop:10,letterSpacing:2,fontWeight:600}}>SERVING</div>}
        </div>})}
      </div></div>
      <div style={{padding:"8px 12px 14px",paddingBottom:"max(14px, env(safe-area-inset-bottom))"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto 1fr",gap:6,alignItems:"center"}}>
          <button onClick={()=>undo()} disabled={!hist.length} style={{padding:"13px 0",borderRadius:12,background:"var(--card)",border:"1px solid var(--border)",color:hist.length?"var(--text)":"var(--text3)",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6,opacity:hist.length?1:.35}}><Icon d={I.undo} size={15} color={hist.length?"var(--text)":"var(--text3)"}/>Undo</button>
          <button onClick={()=>setShowEdit(true)} style={{width:40,height:40,borderRadius:20,background:"var(--card)",border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon d={I.edit} size={14} color="var(--text2)"/></button>
          <button onClick={()=>setSoundOn(x=>!x)} style={{width:48,height:48,borderRadius:24,background:soundOn?"rgba(200,255,0,.1)":"var(--card)",border:`1.5px solid ${soundOn?"rgba(200,255,0,.25)":"var(--border)"}`,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon d={soundOn?I.sound_on:I.sound_off} size={18} color={soundOn?L:"var(--text2)"}/></button>
          <button onClick={()=>setShowShare(true)} style={{width:40,height:40,borderRadius:20,background:"var(--card)",border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon d={I.share} size={14} color="var(--text2)"/></button>
          <button onClick={end} style={{padding:"13px 0",borderRadius:12,background:"var(--card)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Icon d={I.end} size={14} color="var(--text2)"/>End</button>
        </div>
      </div>
    </div>}

    {scr==="final"&&m&&<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,animation:"fadeIn .5s ease"}}>
      <div style={{fontSize:56,marginBottom:12}}>🏆</div>
      <h2 style={{color:L,fontSize:26,fontWeight:900,marginBottom:4}}>{m.winner?`${m.winner===1?p1:p2} Wins!`:"Match Ended"}</h2>
      <p style={{color:"var(--text2)",fontSize:14,marginBottom:20,fontFamily:"var(--mono)",fontWeight:500}}>{fmt(el)} duration</p>
      <div style={{width:"100%",maxWidth:340,background:"var(--card)",borderRadius:16,padding:20,marginBottom:16}}><table style={{width:"100%",borderCollapse:"collapse",fontFamily:"var(--mono)",fontSize:13}}><thead><tr style={{color:"var(--text2)",fontSize:10,letterSpacing:2}}><th style={{textAlign:"left",padding:"0 0 12px",fontWeight:500}}>PLAYER</th>{m.sets.map((_,i)=><th key={i} style={{textAlign:"center",padding:"0 0 12px",fontWeight:500}}>{_.mtb?"MTB":`S${i+1}`}</th>)}</tr></thead><tbody>{[1,2].map(pl=><tr key={pl}><td style={{fontWeight:700,color:m.winner===pl?L:"var(--text)",padding:"6px 0"}}>{pl===1?p1:p2}</td>{m.sets.map((s,i)=>{const v=pl===1?s.a:s.b;return<td key={i} style={{textAlign:"center",fontWeight:700,fontSize:18,color:(pl===1?s.a>s.b:s.b>s.a)?"var(--text)":"var(--text3)",padding:"6px 0"}}>{v}</td>})}</tr>)}</tbody></table></div>
      <div style={{display:"flex",gap:8,width:"100%",maxWidth:340,marginBottom:16}}>{[1,2].map(pl=>{const t=pl===1?m.t1:m.t2;const o=pl===1?m.t2:m.t1;return<div key={pl} style={{flex:1,background:"var(--card)",padding:14,borderRadius:12,textAlign:"center"}}><div style={{fontSize:10,color:"var(--text2)",fontFamily:"var(--mono)",letterSpacing:2,marginBottom:4,fontWeight:600}}>TOTAL PTS</div><div style={{fontSize:22,fontWeight:800,color:t>o?"var(--text)":"var(--text3)"}}>{t}</div><div style={{fontSize:11,color:"var(--text2)",marginTop:2,fontWeight:500}}>{pl===1?p1:p2}</div></div>})}</div>
      <button onClick={()=>setShowShare(true)} style={{width:"100%",maxWidth:340,padding:14,borderRadius:12,background:"var(--card)",border:"1.5px solid var(--border)",color:"var(--text)",fontWeight:700,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:10}}><Icon d={I.share} size={16} color="var(--text2)"/>Share Result</button>
      <button onClick={reset} style={{width:"100%",maxWidth:340,padding:17,borderRadius:14,background:L,color:BG,fontWeight:800,fontSize:16}}>New Match</button>
    </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
