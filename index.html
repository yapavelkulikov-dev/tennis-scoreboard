<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#07090A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Tennis Scoreboard</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body, html { 
      margin: 0; padding: 0; 
      background-color: #07090A; 
      height: 100%; overflow: hidden; 
      overscroll-behavior: none;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;
  const PTS = ["0", "15", "30", "40"];

  /* ─── Helpers ─── */
  function speak(text) {}

  function vibrate(pattern = 25) {
    try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
  }

  function fmtTime(ms) {
    const s = Math.floor(ms / 1000);
    return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, "0")}`;
  }

  function genId(len = 8) {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    let id = "";
    for (let i = 0; i < len; i++) id += chars[Math.floor(Math.random() * chars.length)];
    return id;
  }

  /* ─── Tennis Logic ─── */
  function freshMatch(server) {
    return {
      p1: 0, p2: 0,
      g1: 0, g2: 0,
      s1: 0, s2: 0,
      sets: [],
      total1: 0, total2: 0,
      tb: false, tb1: 0, tb2: 0,
      deuce: false, adv: false, advP: null,
      over: false, winner: null,
      server,
      pointNum: 0,
    };
  }

  function clone(o) { return JSON.parse(JSON.stringify(o)); }

  function winGame(s, p) {
    if (p === 1) s.g1++; else s.g2++;
    s.p1 = 0; s.p2 = 0;
    s.deuce = false; s.adv = false; s.advP = null;
    s.tb1 = 0; s.tb2 = 0; s.tb = false;
    s.server = s.server === 1 ? 2 : 1;
    
    if (s.g1 >= 6 && s.g1 - s.g2 >= 2) return winSet(s, 1);
    if (s.g2 >= 6 && s.g2 - s.g1 >= 2) return winSet(s, 2);
    if (s.g1 === 6 && s.g2 === 6) s.tb = true;
    return s;
  }

  function winSet(s, p) {
    s.sets.push({ a: s.g1, b: s.g2 });
    if (p === 1) s.s1++; else s.s2++;
    s.g1 = 0; s.g2 = 0;
    if (s.s1 >= 2) { s.over = true; s.winner = 1; }
    if (s.s2 >= 2) { s.over = true; s.winner = 2; }
    return s;
  }

  function point(prev, p) {
    const s = clone(prev);
    if (s.over) return s;
    s.pointNum++;
    if (p === 1) s.total1++; else s.total2++;

    if (s.tb) {
      if (p === 1) s.tb1++; else s.tb2++;
      s.p1 = s.tb1; s.p2 = s.tb2;
      if ((s.tb1 + s.tb2) % 2 === 1) s.server = s.server === 1 ? 2 : 1;
      if (s.tb1 >= 7 && s.tb1 - s.tb2 >= 2) return winGame(s, 1);
      if (s.tb2 >= 7 && s.tb2 - s.tb1 >= 2) return winGame(s, 2);
      return s;
    }

    if (s.p1 >= 3 && s.p2 >= 3) {
      if (s.adv) {
        if (s.advP === p) return winGame(s, p);
        s.adv = false; s.advP = null; s.deuce = true;
        return s;
      }
      if (s.deuce || (s.p1 === 3 && s.p2 === 3)) {
        s.deuce = false; s.adv = true; s.advP = p;
        return s;
      }
    }

    if (p === 1) s.p1++; else s.p2++;
    if (s.p1 >= 4 && s.p1 - s.p2 >= 2) return winGame(s, 1);
    if (s.p2 >= 4 && s.p2 - s.p1 >= 2) return winGame(s, 2);
    if (s.p1 >= 4) return winGame(s, 1);
    if (s.p2 >= 4) return winGame(s, 2);
    
    if (s.p1 === 3 && s.p2 === 3) s.deuce = true;
    return s;
  }

  function getPts(m, p) {
    if (m.tb) return p === 1 ? String(m.tb1) : String(m.tb2);
    if (m.deuce) return "40";
    if (m.adv) return m.advP === p ? "AD" : "40";
    const v = p === 1 ? m.p1 : m.p2;
    return PTS[v] || String(v);
  }

  function checkSwitchSides(m) {
    if (m.over) return false;
    if (m.tb) {
      const sum = m.tb1 + m.tb2;
      return sum > 0 && sum % 6 === 0;
    }
    const gamesSum = m.g1 + m.g2;
    return gamesSum > 0 && gamesSum % 2 !== 0 && m.p1 === 0 && m.p2 === 0;
  }

  /* ─── P2P Host ─── */
  function usePeerHost() {
    const peerRef = useRef(null);
    const connsRef = useRef([]);
    const [peerId, setPeerId] = useState(null);
    const [peerReady, setPeerReady] = useState(false);
    const [viewerCount, setViewerCount] = useState(0);
    const lastStateRef = useRef(null);

    useEffect(() => {
      const id = "ts_" + genId(10);
      
      let peer;
      try {
        peer = new Peer(id, {
          debug: 0,
          config: {
            iceServers: [
              { urls: "stun:stun.l.google.com:19302" },
              { urls: "stun:stun1.l.google.com:19302" },
              { urls: "stun:stun2.l.google.com:19302" },
              { urls: "stun:stun3.l.google.com:19302" },
              { urls: "stun:stun4.l.google.com:19302" },
            ]
          }
        });
      } catch(e) {
        console.error("[Host] Failed to create Peer:", e);
        return;
      }

      peer.on("open", (openId) => {
        console.log("[Host] Peer open:", openId);
        setPeerId(openId);
        setPeerReady(true);
      });

      peer.on("connection", (conn) => {
        console.log("[Host] Viewer connected");
        conn.on("open", () => {
          connsRef.current = [...connsRef.current, conn];
          setViewerCount(connsRef.current.length);
          // Send current state immediately to new viewer
          if (lastStateRef.current) {
            try { conn.send(lastStateRef.current); } catch(e) {}
          }
        });
        conn.on("close", () => {
          connsRef.current = connsRef.current.filter(c => c !== conn);
          setViewerCount(connsRef.current.length);
        });
        conn.on("error", () => {
          connsRef.current = connsRef.current.filter(c => c !== conn);
          setViewerCount(connsRef.current.length);
        });
      });

      peer.on("error", (err) => {
        console.error("[Host] Peer error:", err.type);
        if (err.type === "disconnected" || err.type === "network") {
          setTimeout(() => { try { peer.reconnect(); } catch(e) {} }, 3000);
        }
      });

      peer.on("disconnected", () => {
        console.log("[Host] Disconnected, reconnecting...");
        setTimeout(() => { try { peer.reconnect(); } catch(e) {} }, 2000);
      });

      peerRef.current = peer;

      return () => {
        connsRef.current.forEach(c => { try { c.close(); } catch(e) {} });
        try { peer.destroy(); } catch(e) {}
      };
    }, []);

    const broadcast = useCallback((data) => {
      lastStateRef.current = data;
      const dead = [];
      connsRef.current.forEach(conn => {
        try {
          if (conn.open) conn.send(data);
          else dead.push(conn);
        } catch(e) { dead.push(conn); }
      });
      if (dead.length) {
        connsRef.current = connsRef.current.filter(c => !dead.includes(c));
        setViewerCount(connsRef.current.length);
      }
    }, []);

    return { peerId, peerReady, broadcast, viewerCount };
  }

  /* ─── P2P Viewer ─── */
  function usePeerViewer(hostId) {
    const [state, setState] = useState(null);
    const [status, setStatus] = useState("connecting");
    const destroyedRef = useRef(false);
    const retriesRef = useRef(0);
    const maxRetries = 20;

    useEffect(() => {
      if (!hostId) { setStatus("error"); return; }
      destroyedRef.current = false;

      let currentPeer = null;

      function connect() {
        if (destroyedRef.current) return;
        
        const myId = "tv_" + genId(12);
        let peer;
        try {
          peer = new Peer(myId, {
            debug: 0,
            config: {
              iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                { urls: "stun:stun2.l.google.com:19302" },
              ]
            }
          });
        } catch(e) {
          console.error("[Viewer] Failed to create peer:", e);
          setStatus("error");
          return;
        }
        
        currentPeer = peer;

        peer.on("open", () => {
          if (destroyedRef.current) { peer.destroy(); return; }
          console.log("[Viewer] My peer open, connecting to host:", hostId);
          setStatus("connecting");
          
          const conn = peer.connect(hostId, { 
            reliable: true,
            serialization: "json"
          });

          const connTimeout = setTimeout(() => {
            console.log("[Viewer] Connection timeout");
            if (!destroyedRef.current) retry(peer);
          }, 15000);

          conn.on("open", () => {
            clearTimeout(connTimeout);
            console.log("[Viewer] Connected!");
            setStatus("connected");
            retriesRef.current = 0;
          });

          conn.on("data", (data) => {
            setState(data);
            setStatus("connected");
          });

          conn.on("close", () => {
            clearTimeout(connTimeout);
            console.log("[Viewer] Connection closed");
            if (!destroyedRef.current) {
              setStatus("connecting");
              retry(peer);
            }
          });

          conn.on("error", (err) => {
            clearTimeout(connTimeout);
            console.error("[Viewer] Conn error:", err);
            if (!destroyedRef.current) retry(peer);
          });
        });

        peer.on("error", (err) => {
          console.error("[Viewer] Peer error:", err.type);
          if (!destroyedRef.current) {
            if (err.type === "peer-unavailable") {
              setStatus("error");
            }
            retry(peer);
          }
        });

        peer.on("disconnected", () => {
          if (!destroyedRef.current) retry(peer);
        });
      }

      function retry(oldPeer) {
        retriesRef.current++;
        if (retriesRef.current > maxRetries) {
          setStatus("error");
          return;
        }
        const delay = Math.min(1500 + 1000 * retriesRef.current, 10000);
        console.log(`[Viewer] Retry ${retriesRef.current}/${maxRetries} in ${delay}ms`);
        setTimeout(() => {
          try { oldPeer.destroy(); } catch(e) {}
          if (!destroyedRef.current) connect();
        }, delay);
      }

      connect();

      return () => {
        destroyedRef.current = true;
        try { currentPeer?.destroy(); } catch(e) {}
      };
    }, [hostId]);

    return { state, status };
  }

  /* ─── Components ─── */

  function CoinToss({ p1, p2, onResult }) {
    const [phase, setPhase] = useState("idle");
    const [result, setResult] = useState(null);

    const toss = () => {
      vibrate(40);
      setPhase("spinning");
      const winner = Math.random() < 0.5 ? 1 : 2;
      setTimeout(() => {
        setResult(winner);
        setPhase("done");
        vibrate([20, 60, 20]);
      }, 1500);
    };

    return (
      <div style={{
        display: "flex", flexDirection: "column", alignItems: "center",
        justifyContent: "center", gap: 24, animation: "fadeUp 0.4s ease",
        padding: "0 20px", width: "100%", height: "100%"
      }}>
        <div style={{
          width: 120, height: 120, borderRadius: "50%",
          background: phase === "spinning"
            ? "conic-gradient(#C8FF00, #0a0f0a, #C8FF00, #0a0f0a, #C8FF00)"
            : result ? "linear-gradient(135deg, #C8FF00, #8BA600)" : "#1a1f1a",
          border: `3px solid ${result ? "#C8FF00" : "#333"}`,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: phase === "spinning" ? `spin 0.3s linear infinite` : "none",
        }} onClick={phase === "idle" ? toss : undefined}>
          <span style={{ fontSize: 36 }}>🎾</span>
        </div>
        
        {phase === "idle" && <p style={{color: "#888"}}>Tap to toss</p>}
        {phase === "spinning" && <p style={{color: "#888"}}>Tossing...</p>}
        
        {phase === "done" && (
          <div style={{ textAlign: "center", marginTop: -10 }}>
            <p style={{color: "#C8FF00", fontWeight: "bold"}}>{result === 1 ? p1 : p2} serves!</p>
            <button onClick={() => onResult(result)} style={{
               marginTop: 20, padding: "12px 30px", background: "#333", 
               color: "#fff", borderRadius: 8, fontWeight: "bold"
            }}>Start Match</button>
          </div>
        )}
      </div>
    );
  }

  /* ─── Share Sheet ─── */
  function ShareSheet({ peerId, p1, p2, match, elapsed, onClose }) {
    const lime = "#C8FF00";
    const [copied, setCopied] = useState(false);
    const shareUrl = `${window.location.origin}${window.location.pathname}?join=${peerId}`;

    const matchText = match ? (() => {
      const sets = match.sets.map((s,i) => `Set ${i+1}: ${s.a}-${s.b}`).join(", ");
      const current = `Games: ${match.g1}-${match.g2}`;
      const pts = `Points: ${getPts(match,1)}-${getPts(match,2)}`;
      const srv = `${match.server === 1 ? p1 : p2} serving`;
      return `🎾 ${p1} vs ${p2}\n${sets ? sets + ", " : ""}${current}\n${pts}\n${srv}\n⏱ ${fmtTime(elapsed)}`;
    })() : "";

    const doShare = async () => {
      if (navigator.share) {
        try {
          await navigator.share({ title: "Live Tennis Score", url: shareUrl });
        } catch(e) {}
      } else {
        try {
          await navigator.clipboard.writeText(shareUrl);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch(e) {}
      }
    };

    const doShareText = async () => {
      if (navigator.share) {
        try {
          await navigator.share({ title: "Tennis Score", text: matchText });
        } catch(e) {}
      } else {
        try {
          await navigator.clipboard.writeText(matchText);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch(e) {}
      }
    };

    return (
      <div style={{
        position: "fixed", inset: 0, zIndex: 1000,
        display: "flex", flexDirection: "column", justifyContent: "flex-end",
      }}>
        <div onClick={onClose} style={{
          position: "absolute", inset: 0,
          background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)"
        }} />
        
        <div style={{
          position: "relative", background: "#141617",
          borderRadius: "20px 20px 0 0", 
          padding: "12px 20px calc(20px + env(safe-area-inset-bottom, 14px))",
          animation: "slideUp 0.3s ease",
        }}>
          <div style={{ width: 36, height: 4, background: "#444", borderRadius: 2, margin: "0 auto 20px" }} />
          
          <h3 style={{ color: "white", fontSize: 20, fontWeight: 800, margin: "0 0 16px" }}>Share Score</h3>

          {/* Live Link */}
          <div style={{
            background: "#1a2010", border: `1px solid ${lime}33`,
            borderRadius: 14, padding: 16, marginBottom: 16,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: lime, animation: "blink 2s infinite" }} />
              <span style={{ color: lime, fontWeight: 700, fontSize: 15 }}>Live Scoreboard</span>
            </div>
            <p style={{ color: "#8a9a6a", fontSize: 13, margin: "0 0 14px", lineHeight: 1.4 }}>
              Opponent opens this link — sees live score on phone, watch, and headphones.
            </p>
            <button onClick={doShare} style={{
              width: "100%", padding: 14, borderRadius: 10,
              background: lime, color: "black", fontWeight: 800, fontSize: 15,
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            }}>
              {copied ? "✓ Copied!" : "📤 Share Live Link"}
            </button>
          </div>

          {/* Text Score */}
          {match && (
            <div style={{
              background: "#1a1c1d", border: "1px solid #2a2c2d",
              borderRadius: 14, padding: 16, marginBottom: 12,
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <span style={{ fontSize: 16 }}>🎾</span>
                <span style={{ color: "white", fontWeight: 700 }}>{p1} vs {p2}</span>
              </div>
              <div style={{ color: "#888", fontSize: 13, fontFamily: "'DM Mono', monospace", lineHeight: 1.6 }}>
                {match.sets.map((s,i) => <div key={i}>Set {i+1}: {s.a}-{s.b}</div>)}
                <div>Games: {match.g1}-{match.g2}</div>
                <div>Points: {getPts(match,1)}-{getPts(match,2)}</div>
                <div>{match.server === 1 ? p1 : p2} serving</div>
                <div>⏱ {fmtTime(elapsed)}</div>
              </div>
            </div>
          )}

          <button onClick={doShareText} style={{
            width: "100%", padding: 14, borderRadius: 10,
            background: "transparent", color: "white", fontWeight: 700, fontSize: 15,
            border: "1px solid #333",
          }}>
            Share as Text
          </button>
        </div>
      </div>
    );
  }

  /* ─── Viewer Screen ─── */
  function ViewerScreen({ hostId }) {
    const { state, status } = usePeerViewer(hostId);
    const lime = "#C8FF00";
    const bg = "#07090A";

    if (status === "connecting" && !state) {
      return (
        <div style={{
          fontFamily: "'Outfit', sans-serif", height: "100vh", background: bg, color: "white",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          paddingTop: "max(env(safe-area-inset-top, 20px), 20px)",
        }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');
            @keyframes spin { to { transform: rotate(360deg); } }
          `}</style>
          <div style={{
            width: 50, height: 50, border: "3px solid #333",
            borderTop: `3px solid ${lime}`, borderRadius: "50%",
            animation: "spin 1s linear infinite", marginBottom: 20,
          }} />
          <p style={{ color: "#888", fontSize: 15 }}>Connecting to match...</p>
        </div>
      );
    }

    if (status === "error" && !state) {
      return (
        <div style={{
          fontFamily: "'Outfit', sans-serif", height: "100vh", background: bg, color: "white",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          paddingTop: "max(env(safe-area-inset-top, 20px), 20px)",
        }}>
          <style>{`@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');`}</style>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📡</div>
          <h2 style={{ marginBottom: 6 }}>Cannot Connect</h2>
          <p style={{ color: "#666", marginBottom: 24, textAlign: "center", padding: "0 40px", lineHeight: 1.5 }}>
            Match not found. Ask scorer for a new link.
          </p>
          <button onClick={() => window.location.reload()} style={{
            padding: "14px 40px", borderRadius: 12, background: lime,
            color: "black", fontWeight: 800, fontSize: 15, border: "none",
            fontFamily: "'Outfit', sans-serif",
          }}>Retry</button>
        </div>
      );
    }

    const d = state;
    if (!d) return null;
    const { match: m, p1, p2, elapsed } = d;

    return (
      <div style={{
        fontFamily: "'Outfit', sans-serif", height: "100vh", background: bg, color: "white",
        display: "flex", flexDirection: "column", overflow: "hidden",
        paddingTop: "max(env(safe-area-inset-top, 20px), 20px)",
      }}>
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;700;800;900&display=swap');
          @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
          @keyframes spin { to { transform: rotate(360deg); } }
          * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        `}</style>

        {/* Connection indicator */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "8px", fontSize: 11, color: "#555" }}>
          <div style={{
            width: 6, height: 6, borderRadius: "50%",
            background: status === "connected" ? lime : "#f5a623",
            animation: status === "connecting" ? "blink 1s infinite" : "none",
          }} />
          {status === "connected" ? "LIVE" : "Reconnecting..."}
        </div>

        {/* Top Bar */}
        <div style={{ padding: "8px 15px", display: "flex", justifyContent: "space-between", color: "#666", fontSize: 13, fontFamily: "'DM Mono', monospace" }}>
          <span>{fmtTime(elapsed)}</span>
          <span>{m.tb ? "TIEBREAK" : `SET ${m.sets.length + 1}`}</span>
          <span>PT {m.pointNum}</span>
        </div>

        <div style={{ textAlign: "center", padding: "4px 15px", fontSize: 13, fontFamily: "'DM Mono', monospace", color: "#888" }}>
          {m.server === 1 ? p1 : p2} serving
        </div>

        {/* Sets */}
        {m.sets.length > 0 && (
          <div style={{display: "flex", justifyContent: "center", gap: 15, padding: "10px 0", fontSize: 14, fontFamily: "'DM Mono', monospace"}}>
            {m.sets.map((s, i) => (
              <span key={i} style={{color: "#888"}}>
                <span style={{color: s.a > s.b ? lime : "#888"}}>{s.a}</span>-<span style={{color: s.b > s.a ? lime : "#888"}}>{s.b}</span>
              </span>
            ))}
          </div>
        )}

        {/* Score Cards */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: 15 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {[1, 2].map(pl => {
              const isSrv = m.server === pl;
              const pts = getPts(m, pl);
              return (
                <div key={pl} style={{
                  background: "#121415", borderRadius: 20, padding: 20,
                  textAlign: "center", position: "relative",
                  border: isSrv ? `1px solid ${lime}` : "1px solid #222"
                }}>
                  {isSrv && <div style={{position:"absolute", top:10, right:10, width:8, height:8, background:lime, borderRadius:"50%"}} />}
                  <div style={{color: "#aaa", fontWeight: 700, fontSize: 14, marginBottom: 10, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis"}}>
                    {pl === 1 ? p1 : p2}
                  </div>
                  <div style={{fontSize: 24, fontWeight: 800, marginBottom: 10}}>
                    {pl === 1 ? m.g1 : m.g2} <span style={{fontSize: 10, color: "#444", fontWeight: 400}}>GAMES</span>
                  </div>
                  <div style={{fontSize: 70, fontWeight: 900, color: pts === "AD" ? lime : "white", lineHeight: 1}}>
                    {pts}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {m.over && (
          <div style={{ padding: 20, textAlign: "center" }}>
            <div style={{ fontSize: 40, marginBottom: 8 }}>🏆</div>
            <div style={{ color: lime, fontWeight: 800, fontSize: 22 }}>
              {m.winner === 1 ? p1 : p2} Wins!
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ─── Main Scorer App ─── */
  function TennisScoreboard() {
    // Check viewer mode first
    const params = new URLSearchParams(window.location.search);
    const joinId = params.get("join");
    if (joinId) {
      return <ViewerScreen hostId={joinId} />;
    }

    const [screen, setScreen] = useState("setup");
    const [p1, setP1] = useState("Player 1");
    const [p2, setP2] = useState("Player 2");
    const [match, setMatch] = useState(null);
    const [hist, setHist] = useState([]);
    const [elapsed, setElapsed] = useState(0);
    const [flash, setFlash] = useState(null);
    const [showShare, setShowShare] = useState(false);
    const timerRef = useRef(null);
    const startRef = useRef(null);

    const { peerId, peerReady, broadcast, viewerCount } = usePeerHost();

    const startTimer = () => {
      startRef.current = Date.now();
      timerRef.current = setInterval(() => setElapsed(Date.now() - startRef.current), 1000);
    };
    const stopTimer = () => clearInterval(timerRef.current);

    const startMatch = (server) => {
      const m = freshMatch(server);
      setMatch(m);
      setHist([]);
      setElapsed(0);
      setScreen("match");
      startTimer();
    };

    // Broadcast on match state change
    useEffect(() => {
      if (match && peerReady) {
        broadcast({ match: clone(match), p1, p2, elapsed });
      }
    }, [match, peerReady]);

    // Broadcast timer periodically
    useEffect(() => {
      if (screen !== "match" || !peerReady || !match) return;
      const iv = setInterval(() => {
        if (startRef.current) {
          const el = Date.now() - startRef.current;
          broadcast({ match: clone(match), p1, p2, elapsed: el });
        }
      }, 5000);
      return () => clearInterval(iv);
    }, [screen, peerReady, match, p1, p2]);

    const doScore = useCallback((p) => {
      if (!match || match.over) return;
      vibrate(30);
      setHist(h => [...h, clone(match)]);
      const next = point(match, p);
      setMatch(next);
      setFlash(p);
      setTimeout(() => setFlash(null), 300);

      if (next.over) {
        setTimeout(() => { stopTimer(); setScreen("final"); }, 1500);
      }
    }, [match]);

    const doUndo = useCallback(() => {
      if (hist.length === 0) return;
      vibrate(20);
      setMatch(hist[hist.length - 1]);
      setHist(h => h.slice(0, -1));
    }, [hist]);

    const reset = () => { stopTimer(); setScreen("setup"); };

    const lime = "#C8FF00";
    const bg = "#07090A";
    const showSwitch = match ? checkSwitchSides(match) : false;

    return (
      <div style={{
        fontFamily: "'Outfit', sans-serif",
        height: "100vh", background: bg, color: "white",
        display: "flex", flexDirection: "column", overflow: "hidden",
        paddingTop: "max(env(safe-area-inset-top, 20px), 20px)",
      }}>
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;700;800;900&display=swap');
          @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
          @keyframes spin { to { transform: rotate(360deg); } }
          @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
          @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
          * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
          button { border: none; font-family: inherit; cursor: pointer; }
          input:focus { outline: none; border-color: ${lime} !important; }
        `}</style>

        {/* SETUP */}
        {screen === "setup" && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 30 }}>
            <div style={{ fontSize: 40, marginBottom: 20 }}>🎾</div>
            <h1 style={{ marginBottom: 40 }}>Tennis Score</h1>
            <input value={p1} onChange={e=>setP1(e.target.value)} placeholder="Player 1" style={{width: "100%", padding: 15, marginBottom: 15, borderRadius: 10, background: "#1a1a1a", border: "1px solid #333", color: "white", fontSize: 16}} />
            <input value={p2} onChange={e=>setP2(e.target.value)} placeholder="Player 2" style={{width: "100%", padding: 15, marginBottom: 30, borderRadius: 10, background: "#1a1a1a", border: "1px solid #333", color: "white", fontSize: 16}} />
            <button onClick={() => setScreen("toss")} style={{width: "100%", padding: 18, borderRadius: 12, background: lime, color: "black", fontWeight: 800, fontSize: 16}}>CONTINUE</button>
          </div>
        )}

        {/* TOSS */}
        {screen === "toss" && <CoinToss p1={p1} p2={p2} onResult={startMatch} />}

        {/* MATCH */}
        {screen === "match" && match && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
            <div style={{ padding: "10px 15px", display: "flex", justifyContent: "space-between", alignItems: "center", color: "#666", fontSize: 13, fontFamily: "'DM Mono', monospace" }}>
              <span>{fmtTime(elapsed)}</span>
              <span>{match.tb ? "TIEBREAK" : `SET ${match.sets.length + 1}`}</span>
              <span>PT {match.pointNum}</span>
            </div>

            {showSwitch && (
              <div style={{
                background: lime, color: "black", textAlign: "center",
                padding: "8px", fontWeight: "900", letterSpacing: 1,
                animation: "blink 1s infinite", fontSize: 14
              }}>
                🔁 CHANGE ENDS
              </div>
            )}

            <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: 10 }}>
              {match.sets.length > 0 && (
                 <div style={{display: "flex", justifyContent: "center", gap: 15, marginBottom: 10, fontSize: 14, fontFamily: "'DM Mono', monospace"}}>
                    {match.sets.map((s, i) => (
                      <span key={i} style={{color: "#888"}}>
                        <span style={{color: s.a > s.b ? lime : "#888"}}>{s.a}</span>-<span style={{color: s.b > s.a ? lime : "#888"}}>{s.b}</span>
                      </span>
                    ))}
                 </div>
              )}

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {[1, 2].map(pl => {
                   const isSrv = match.server === pl;
                   const pts = getPts(match, pl);
                   return (
                     <div key={pl} style={{
                       background: "#121415", borderRadius: 20, padding: 20,
                       textAlign: "center", position: "relative",
                       border: isSrv ? `1px solid ${lime}` : "1px solid #222"
                     }}>
                        {isSrv && <div style={{position:"absolute", top:10, right:10, width:8, height:8, background:lime, borderRadius:"50%"}} />}
                        <div style={{color: "#aaa", fontWeight: 700, fontSize: 14, marginBottom: 10, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis"}}>
                          {pl === 1 ? p1 : p2}
                        </div>
                        <div style={{fontSize: 24, fontWeight: 800, marginBottom: 10}}>
                          {pl === 1 ? match.g1 : match.g2} <span style={{fontSize: 10, color: "#444", fontWeight: 400}}>GAMES</span>
                        </div>
                        <div style={{fontSize: 70, fontWeight: 900, color: pts === "AD" ? lime : "white", lineHeight: 1}}>
                          {pts}
                        </div>
                     </div>
                   )
                })}
              </div>
            </div>

            <div style={{ padding: "15px 20px 20px" }}>
               <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 15 }}>
                  <button onClick={() => doScore(1)} style={{padding: 30, borderRadius: 16, background: "#1f2223", color: lime, fontSize: 18, fontWeight: 800, border: `1px solid ${lime}`}}>{p1}</button>
                  <button onClick={() => doScore(2)} style={{padding: 30, borderRadius: 16, background: "#1f2223", color: lime, fontSize: 18, fontWeight: 800, border: `1px solid ${lime}`}}>{p2}</button>
               </div>
               <div style={{display: "flex", gap: 10}}>
                 <button onClick={doUndo} disabled={hist.length===0} style={{flex: 1, padding: 15, borderRadius: 12, background: "#111", color: "#666", border: "1px solid #333"}}>Undo</button>
                 <button onClick={() => setShowShare(true)} style={{flex: 1, padding: 15, borderRadius: 12, background: "#111", color: viewerCount > 0 ? lime : "#666", border: viewerCount > 0 ? `1px solid ${lime}33` : "1px solid #333", position: "relative"}}>
                   Share
                   {viewerCount > 0 && (
                     <span style={{
                       position: "absolute", top: -6, right: -6,
                       background: lime, color: "black", fontSize: 10, fontWeight: 800,
                       width: 18, height: 18, borderRadius: "50%",
                       display: "flex", alignItems: "center", justifyContent: "center",
                     }}>{viewerCount}</span>
                   )}
                 </button>
                 <button onClick={() => {stopTimer(); setScreen("final")}} style={{flex: 1, padding: 15, borderRadius: 12, background: "#111", color: "#666", border: "1px solid #333"}}>End</button>
               </div>
            </div>
          </div>
        )}

        {/* FINAL */}
        {screen === "final" && match && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20 }}>
             <div style={{fontSize: 60, marginBottom: 10}}>🏆</div>
             <h2 style={{color: lime, fontSize: 28, textTransform: "uppercase", marginBottom: 5}}>
               {match.winner ? (match.winner === 1 ? p1 : p2) + " Wins!" : "Finished"}
             </h2>
             <p style={{color: "#555", marginBottom: 30}}>{fmtTime(elapsed)} match duration</p>

             <div style={{ width: "100%", maxWidth: 350, background: "#121415", borderRadius: 16, padding: 20, marginBottom: 20 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1.5fr repeat(3, 1fr)", marginBottom: 15, borderBottom: "1px solid #222", paddingBottom: 10, fontSize: 12, color: "#555", fontFamily: "'DM Mono', monospace" }}>
                   <div style={{textAlign: "left"}}>PLAYER</div>
                   <div style={{textAlign: "center"}}>SET 1</div>
                   <div style={{textAlign: "center"}}>SET 2</div>
                   <div style={{textAlign: "center"}}>SET 3</div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1.5fr repeat(3, 1fr)", marginBottom: 15, alignItems: "center" }}>
                   <div style={{fontWeight: 700, color: match.winner === 1 ? lime : "white", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{p1}</div>
                   {[0, 1, 2].map(i => {
                      const set = match.sets[i];
                      let val = "-"; let color = "#333";
                      if (set) { val = set.a; color = set.a > set.b ? "white" : "#666"; }
                      else if (!match.over && match.sets.length === i) { val = match.g1; color = "#888"; }
                      return <div key={i} style={{textAlign: "center", fontWeight: 700, fontSize: 18, color}}>{val}</div>
                   })}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1.5fr repeat(3, 1fr)", alignItems: "center" }}>
                   <div style={{fontWeight: 700, color: match.winner === 2 ? lime : "white", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{p2}</div>
                   {[0, 1, 2].map(i => {
                      const set = match.sets[i];
                      let val = "-"; let color = "#333";
                      if (set) { val = set.b; color = set.b > set.a ? "white" : "#666"; }
                      else if (!match.over && match.sets.length === i) { val = match.g2; color = "#888"; }
                      return <div key={i} style={{textAlign: "center", fontWeight: 700, fontSize: 18, color}}>{val}</div>
                   })}
                </div>
             </div>

             <div style={{ display: "flex", gap: 10, width: "100%", maxWidth: 350, marginBottom: 30 }}>
                <div style={{flex: 1, background: "#1a1a1a", padding: 15, borderRadius: 12, textAlign: "center"}}>
                   <div style={{fontSize: 10, color: "#555", marginBottom: 5}}>TOTAL POINTS</div>
                   <div style={{fontSize: 20, fontWeight: 700, color: match.total1 > match.total2 ? "white" : "#666"}}>{match.total1}</div>
                   <div style={{fontSize: 10, color: "#444", marginTop: 2}}>{p1}</div>
                </div>
                <div style={{flex: 1, background: "#1a1a1a", padding: 15, borderRadius: 12, textAlign: "center"}}>
                   <div style={{fontSize: 10, color: "#555", marginBottom: 5}}>TOTAL POINTS</div>
                   <div style={{fontSize: 20, fontWeight: 700, color: match.total2 > match.total1 ? "white" : "#666"}}>{match.total2}</div>
                   <div style={{fontSize: 10, color: "#444", marginTop: 2}}>{p2}</div>
                </div>
             </div>

             <button onClick={reset} style={{ width: "100%", maxWidth: 350, padding: 18, borderRadius: 12, background: lime, color: "black", fontWeight: 800, fontSize: 16 }}>NEW MATCH</button>
          </div>
        )}

        {/* Share Sheet */}
        {showShare && peerId && (
          <ShareSheet
            peerId={peerId} p1={p1} p2={p2}
            match={match} elapsed={elapsed}
            onClose={() => setShowShare(false)}
          />
        )}
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<TennisScoreboard />);
</script>

</body>
</html>
